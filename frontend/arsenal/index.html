<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Rambo - Arsenal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb-find@8.0.1/dist/pouchdb.find.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    
    <script src="../config.js"></script>
    
    <script src="../global/workflows/initialiser-pouchdb/code/index.js"></script>
    <script src="workflows/charger-profil/code/index.js"></script>
    <script src="workflows/sauvegarder-profil/code/index.js"></script>
    
    <style>
        :root {
            --rambo-red: #FF0000;
            --camouflage-green: #2E8B57;
            --gunmetal-gray: #2F4F4F;
            --gold: #FFD700;
            --text-white: #FFFFFF;
            --bg-dark: #1a1a1a;
            --border-color: #333;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--gunmetal-gray);
            color: var(--text-white);
            min-height: 100vh;
        }
        
        .layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 220px;
            background: var(--bg-dark);
            border-right: 2px solid var(--rambo-red);
            padding: 20px 0;
            flex-shrink: 0;
        }
        
        .logo {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-family: 'Impact', sans-serif;
            color: var(--rambo-red);
            font-size: 1.4rem;
            text-shadow: 2px 2px 0 var(--gold);
        }
        
        .nav-item {
            display: block;
            padding: 15px 20px;
            color: var(--text-white);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 0, 0, 0.1);
            border-left-color: var(--rambo-red);
        }
        
        .nav-item .icon { margin-right: 10px; }
        
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .header h2 {
            font-family: 'Impact', sans-serif;
            font-size: 1.8rem;
            color: var(--gold);
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: var(--rambo-red);
            color: white;
            border: none;
            padding: 12px 24px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 var(--gold);
        }
        
        .btn-primary:hover:not(:disabled) { transform: translate(-2px, -2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .form-container {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            padding: 30px;
            max-width: 800px;
        }
        
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .section-title {
            font-family: 'Impact', sans-serif;
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #888;
        }
        
        .form-group input,
        .form-group textarea {
            padding: 12px;
            background: var(--gunmetal-gray);
            border: 2px solid var(--border-color);
            color: var(--text-white);
            font-family: inherit;
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--rambo-red);
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px 24px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        .success-msg {
            background: rgba(46, 204, 113, 0.1);
            border-left: 4px solid var(--camouflage-green);
            padding: 15px 20px;
            margin-bottom: 20px;
            color: var(--camouflage-green);
        }
        
        .error-msg {
            background: rgba(231, 76, 60, 0.1);
            border-left: 4px solid var(--rambo-red);
            padding: 15px 20px;
            margin-bottom: 20px;
            color: var(--rambo-red);
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: var(--rambo-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="layout" x-data="{ ...pouchdbInitializer(), ...profilLoader(), ...profilSaver() }" x-init="$data.init(); initProfil()">
        
        <aside class="sidebar">
            <div class="logo">
                <h1>🔫 CV RAMBO</h1>
            </div>
            <nav>
                <a href="../dashboard/index.html" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="../ajout-url/index.html" class="nav-item">
                    <span class="icon">➕</span> Ajouter
                </a>
                <a href="../kanban/index.html" class="nav-item">
                    <span class="icon">📋</span> Kanban
                </a>
                <a href="../mode-rafale/index.html" class="nav-item">
                    <span class="icon">🚀</span> Rafale
                </a>
                <a href="#" class="nav-item active">
                    <span class="icon">⚔️</span> Arsenal
                </a>
                <a href="../settings/index.html" class="nav-item">
                    <span class="icon">⚙️</span> Settings
                </a>
            </nav>
        </aside>
        
        <main class="main">
            <div class="header">
                <h2>⚔️ Mon Arsenal</h2>
            </div>
            
            <!-- Messages -->
            <div class="success-msg" x-show="saveSuccess" x-text="'Profil sauvegardé avec succès !'"></div>
            <div class="error-msg" x-show="saveError" x-text="saveError"></div>
            
            <!-- Loading -->
            <div class="loading" x-show="loading">
                <div class="spinner"></div>
            </div>
            
            <!-- Form -->
            <div class="form-container" x-show="!loading">
                
                <!-- Informations de base -->
                <div class="form-section">
                    <div class="section-title">👤 Informations personnelles</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" x-model="profil.prenom" placeholder="John">
                        </div>
                        
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" x-model="profil.nom" placeholder="Doe">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" x-model="profil.email" placeholder="john@example.com">
                        </div>
                        
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="tel" x-model="profil.telephone" placeholder="+33 6 12 34 56 78">
                        </div>
                    </div>
                </div>
                
                <!-- Profil professionnel -->
                <div class="form-section">
                    <div class="section-title">💼 Profil professionnel</div>
                    
                    <div class="form-group full-width">
                        <label>LinkedIn</label>
                        <input type="url" x-model="profil.linkedin" placeholder="https://linkedin.com/in/johndoe">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>CV Texte (résumé de votre parcours)</label>
                        <textarea x-model="profil.cvTexte" placeholder="Décrivez votre expérience, formations, compétences principales..."></textarea>
                        
                        <div class="hint">Ce texte sera utilisé par l'IA pour générer des scripts personnalisés.</div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Compétences (séparées par des virgules)</label>
                        <input type="text" x-model="profil.competences" placeholder="JavaScript, React, Node.js, Python...">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Poste recherché</label>
                        <input type="text" x-model="profil.posteRecherche" placeholder="Développeur Fullstack Senior">
                    </div>
                </div>
                
                <div class="form-actions">
                    <button class="btn-primary" :disabled="isSaving" @click="saveProfil()">
                        <span x-show="!isSaving">💾 Sauvegarder</span>
                        <span x-show="isSaving">⏳ Sauvegarde...</span>
                    </button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
