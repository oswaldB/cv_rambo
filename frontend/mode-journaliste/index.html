<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CV Rambo - Mode Journaliste</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="workflows/lancer-session/code/index.js"></script>
  <script src="workflows/envoyer-question/code/index.js"></script>
  <script src="workflows/ignorer-question/code/index.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto Condensed',sans-serif;background:linear-gradient(135deg,#2F4F4F,#0a0a0a);min-height:100vh;color:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:40px}</style>
</head>
<body x-data="{...workflowLancerSession(),...workflowEnvoyerQuestion(),...workflowIgnorerQuestion()}">
  <div style="max-width:800px;width:100%;text-align:center">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:#FFD700;letter-spacing:4px">🤖 MODE JOURNALISTE</h1>
    <p style="color:#2E8B57;margin-bottom:30px">ENRICHIS TON CV AVEC L'IA</p>
    <div style="background:rgba(0,0,0,0.4);border:2px solid #FFD700;padding:30px">
      <div style="margin-bottom:20px">
        <input type="text" x-ref="questionInput" placeholder="Pose ta question..." style="width:100%;padding:15px;background:#1a1a1a;border:2px solid #FFD700;color:#f5f5f5;margin-bottom:15px">
        <div style="display:flex;gap:15px">
          <button @click="envoyerQuestion($refs.questionInput.value)" style="flex:2;background:#2E8B57;border:2px solid #FFD700;color:white;padding:15px;font-family:'Bebas Neue';cursor:pointer">ENVOYER</button>
          <button @click="ignorerQuestion()" style="flex:1;background:transparent;border:2px solid #FFD700;color:#FFD700;padding:15px;font-family:'Bebas Neue';cursor:pointer">PASSER</button>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.05);padding:20px;min-height:200px;text-align:left;border:1px solid #555">
        <p style="color:#666;font-style:italic">Réponses d'Ollama apparaîtront ici...</p>
      </div>
    </div>
  </div>
</body>
</html>
