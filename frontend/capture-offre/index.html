<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Rambo - Capture</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  
  <script src="workflows/detecter-page/code/index.js"></script>
  <script src="workflows/extraire-donnees/code/index.js"></script>
  <script src="workflows/verifier-doublon/code/index.js"></script>
  <script src="workflows/ajouter-liste/code/index.js"></script>
  <script src="workflows/tirer-direct/code/index.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rambo-red: #FF0000;
      --camo-green: #2E8B57;
      --gunmetal-gray: #2F4F4F;
      --gold: #FFD700;
      --black: #0a0a0a;
      --white: #f5f5f5;
    }
    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
    }
    .capture-container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }
    .capture-card {
      background: linear-gradient(135deg, var(--gunmetal-gray) 0%, #1a1a1a 100%);
      border: 3px solid var(--gold);
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
      padding: 40px;
      position: relative;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: var(--camo-green);
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    .btn-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      width: 36px;
      height: 36px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close:hover { background: var(--gold); color: var(--black); }
    .offer-detected {
      text-align: center;
    }
    .offer-info {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--gold);
      padding: 20px;
      margin-bottom: 20px;
    }
    .offer-info h2 {
      color: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      margin-bottom: 5px;
    }
    .offer-info p {
      color: #ccc;
      font-size: 14px;
    }
    .offer-info .domain {
      color: var(--camo-green);
      font-size: 12px;
      margin-top: 10px;
    }
    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    .btn-action {
      flex: 1;
      padding: 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s;
    }
    .btn-action.primary {
      background: var(--camo-green);
      border: 2px solid var(--gold);
      color: white;
    }
    .btn-action.primary:hover {
      background: var(--gold);
      color: var(--black);
    }
    .btn-action.secondary {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
    }
    .btn-action.secondary:hover {
      background: var(--gold);
      color: var(--black);
    }
    .btn-action:disabled {
      background: #333;
      border-color: #555;
      color: #777;
      cursor: not-allowed;
    }
    .no-offer {
      text-align: center;
      padding: 40px;
    }
    .no-offer-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    .warning-duplicate {
      background: rgba(255, 0, 0, 0.2);
      border: 2px solid var(--rambo-red);
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
    }
    .warning-duplicate p {
      color: var(--rambo-red);
      margin-bottom: 10px;
    }
    .duplicate-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .btn-small {
      padding: 8px 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
    }
    .btn-small:hover {
      background: var(--gold);
      color: var(--black);
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--gold);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="captureScreen()" x-init="init()"
      x-data="{...workflowDetecterPage(),...workflowExtraireDonnees(),...workflowVerifierDoublon(),...workflowAjouterListe(),...workflowTirerDirect()}"
      x-init="$nextTick(()=>{init();})"
>
  
  <div class="capture-container">
    <div class="capture-card">
      
      <button class="btn-close" @click="closeCapture()">×</button>
      
      <h1>⚡ CAPTURE</h1>
      <p class="subtitle">ANALYSE DE L'OFFRE</p>
      
      <!-- Loading -->
      <div x-show="analyzing || extracting || adding || shooting" x-cloak>
        <div class="spinner"></div>
        <p style="text-align: center; color: var(--gold);"
           x-text="shooting ? 'CANDIDATURE EN COURS...' : (extracting ? 'EXTRACTION...' : 'ANALYSE...')">
        </p>
      </div>
      
      <!-- Pas d'offre détectée -->
      <div x-show="!analyzing && !detected" class="no-offer" x-cloak>
        <div class="no-offer-icon">🔍</div>
        <h2 style="color: var(--rambo-red); font-family: 'Bebas Neue'; margin-bottom: 10px;">
          AUCUNE OFFRE DÉTECTÉE
        </h2>
        <p>Cette page ne semble pas contenir une offre d'emploi.</p>
        <button class="btn-action secondary" @click="closeCapture()" style="margin-top: 20px;">
          FERMER
        </button>
      </div>
      
      <!-- Offre détectée -->
      <div x-show="detected && !extracting && !adding && !shooting" class="offer-detected" x-cloak>
        
        <!-- Warning doublon -->
        <div x-show="isDuplicate" class="warning-duplicate">
          <p>⚠️ Cette offre existe déjà dans votre Kanban</p>
          <div class="duplicate-actions">
            <button class="btn-small" @click="navigateToKanban()">Voir l'existant</button>
            <button class="btn-small" @click="forceCreate = true; isDuplicate = false">
              Créer quand même
            </button>
          </div>
        </div>
        
        <!-- Info offre -->
        <div class="offer-info" x-show="offerData.title">
          <h2 x-text="offerData.title || 'Titre non trouvé'">Offre détectée</h2>
          <p x-text="offerData.company || 'Entreprise non trouvée'">Entreprise</p>
          <p class="domain" x-text="offerData.domain">domain.com</p>
        </div>
        
        <!-- Boutons actions -->
        <div class="action-buttons" x-show="!isDuplicate">
          <button class="btn-action secondary" 
                  @click="extracting = true; extraireDonnees().then(() => { extracting = false; showEditForm = true; })"
                  :disabled="extracting">
            📋 Modifier d'abord
          </button>
          <button class="btn-action primary" 
                  @click="handleAddToList()"
                  :disabled="adding">
            ➕ Ajouter à la liste
          </button>
        </div>
        
        <button class="btn-action primary" 
                style="width: 100%; margin-top: 15px; background: var(--rambo-red);"
                @click="handleDirectShot()"
                :disabled="shooting"
                x-show="!isDuplicate">
          🔫 TIRER DIRECT (Auto)
        </button>
        
      </div>
      
    </div>
  </div>
  
  <script>
    function captureScreen() {
      return {
        detected: false,
        analyzing: true,
        extracting: false,
        adding: false,
        shooting: false,
        isDuplicate: false,
        forceCreate: false,
        showEditForm: false,
        offerData: {},
        
        async init() {
          // Attendre que les stores soient prêts
          await new Promise(resolve => setTimeout(resolve, 100));
          
          // Lancer la détection
          await this.detecterOffre();
          this.analyzing = false;
          
          // Si offre détectée, extraire automatiquement
          if (this.detected) {
            this.extracting = true;
            const data = await this.$data.workflowExtraireDonnees().extraireDonnees();
            this.offerData = data;
            this.extracting = false;
            
            // Vérifier le doublon
            const check = await this.$data.workflowVerifierDoublon().verifierDoublon(data.url);
            this.isDuplicate = check.isDuplicate;
          }
          
          // Écouter la fermeture
          window.addEventListener('cv-rambo:close-capture', () => {
            window.parent.postMessage({ type: 'close-capture' }, '*');
          });
        },
        
        async handleAddToList() {
          this.adding = true;
          await this.$data.workflowAjouterListe().ajouterListe(this.offerData);
          this.adding = false;
        },
        
        async handleDirectShot() {
          this.shooting = true;
          await this.$data.workflowTirerDirect().tirerDirect(this.offerData);
          this.shooting = false;
        },
        
        closeCapture() {
          window.parent.postMessage({ type: 'close-capture' }, '*');
        },
        
        navigateToKanban() {
          window.parent.postMessage({ type: 'navigate', screen: 'kanban' }, '*');
        }
      }
    }
  </script>
  
</body>
</html>
