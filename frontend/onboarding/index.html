<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Rambo - Onboarding</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  
  <script src="workflows/importer-cv/code/index.js"></script>
  <script src="workflows/verifier-extractions/code/index.js"></script>
  <script src="workflows/parcours-tutoriel/code/index.js"></script>
  <script src="workflows/completer-onboarding/code/index.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rambo-red: #FF0000;
      --camo-green: #2E8B57;
      --gunmetal-gray: #2F4F4F;
      --gold: #FFD700;
      --black: #0a0a0a;
      --white: #f5f5f5;
    }
    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: linear-gradient(135deg, var(--gunmetal-gray) 0%, var(--black) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
    }
    .onboarding-container { width: 100%; max-width: 800px; padding: 20px; }
    .step-card {
      background: linear-gradient(135deg, var(--gunmetal-gray) 0%, #1a1a1a 100%);
      border: 3px solid var(--gold);
      border-left: 6px solid var(--gold);
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), inset 0 0 50px rgba(0, 0, 0, 0.5);
      padding: 40px;
    }
    h1, h2 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      margin-bottom: 10px;
    }
    h1 { font-size: 36px; }
    h2 { font-size: 28px; }
    .subtitle {
      color: var(--white);
      font-family: 'Roboto Condensed', sans-serif;
      margin-bottom: 30px;
      opacity: 0.8;
    }
    .step-indicator { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .step-dot { width: 40px; height: 6px; background: #333; border: 1px solid #555; }
    .step-dot.active { background: var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .choice-buttons { display: flex; flex-direction: column; gap: 20px; }
    .choice-btn {
      background: transparent;
      border: 3px solid var(--gold);
      color: var(--gold);
      padding: 25px 30px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.3s ease;
    }
    .choice-btn:hover { background: var(--gold); color: var(--black); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
    .choice-btn.primary { background: var(--camo-green); border-color: var(--gold); color: var(--white); }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      color: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 15px;
      background: #1a1a1a;
      border: 2px solid var(--gold);
      color: var(--white);
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 16px;
    }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
    .btn-nav {
      padding: 15px 30px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .btn-nav.back { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
    .btn-nav.next { background: var(--camo-green); border: 2px solid var(--gold); color: white; }
    .btn-nav:disabled { background: #333; border-color: #555; color: #777; cursor: not-allowed; }
    .btn-start {
      width: 100%;
      background: var(--gold);
      border: none;
      color: var(--black);
      padding: 25px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      cursor: pointer;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="onboardingScreen()" x-init="init()">
  <div class="onboarding-container"
        x-data="{...workflowImporterCv(),...workflowVerifierExtractions(),...workflowParcoursTutoriel(),...workflowCompleterOnboarding()}"
        x-init="$nextTick(()=>{init();ecouterEvenements();initialiserSauvegarde();ecouterEvenementsTutoriel();ecouterEvenements();})"
  >
    <!-- ÉTAPE 1 -->
    <div x-show="currentStep===1" x-cloak>
      <div class="step-card">
        <div class="step-indicator">
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
          <div class="step-dot"></div>
        </div>
        <h1>Bienvenue, Soldat</h1>
        <p class="subtitle">Prépare ton arsenal pour la mission</p>
        <div x-show="!manualMode&&!uploading" class="choice-buttons">
          <button class="choice-btn primary" @click="$refs.fileInput.click()">📄 Uploader mon CV</button>
          <input type="file" x-ref="fileInput" accept=".pdf,.docx,.doc" @change="handleFileUpload($event)" style="display:none">
          <button class="choice-btn" @click="activerSaisieManuelle()">✏️ Remplir manuellement</button>
        </div>
      </div>
    </div>
    
    <!-- ÉTAPE 2 -->
    <div x-show="currentStep===2" x-cloak>
      <div class="step-card">
        <div class="step-indicator">
          <div class="step-dot"></div>
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
        </div>
        <h2>Vérifie ton profil</h2>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" x-model="profileData.name" @input="validerFormulaire()">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" x-model="profileData.email" @input="validerFormulaire()">
        </div>
        <div class="nav-buttons">
          <button class="btn-nav back" @click="currentStep=1">← RETOUR</button>
          <button class="btn-nav next" @click="finaliserVerification();currentStep=3" :disabled="!valid">SUIVANT →</button>
        </div>
      </div>
    </div>
    
    <!-- ÉTAPE 3: TUTORIEL -->
    <div x-show="currentStep===3" x-cloak>
      <div class="step-card">
        <div class="step-indicator">
          <div class="step-dot"></div>
          <div class="step-dot"></div>
          <div class="step-dot active"></div>
        </div>
        <h2>Formation au combat</h2>
        <p class="subtitle">Découvre tes armes</p>
        <div class="nav-buttons">
          <button class="btn-nav back" @click="demoIndex>0?demoIndex--:currentStep=2" :disabled="demoIndex===0">← PRÉCÉDENT</button>
          <button class="btn-nav next" @click="demoIndex<2?demoIndex++:terminerTutoriel()">TERMINER →</button>
        </div>
      </div>
    </div>
    
    <!-- COMPLETION -->
    <div x-show="currentStep===4" x-cloak>
      <div class="step-card" style="text-align:center">
        <div style="font-size:80px;margin-bottom:20px">🎖️</div>
        <h1>MISSION ACCEPTÉE</h1>
        <p class="subtitle">Bienvenue dans CV Rambo, soldat !</p>
        <button class="btn-start" @click="commencerUtilisation()">COMMENCER →</button>
      </div>
    </div>
  </div>
  
  <script>
    function onboardingScreen() {
      return {
        currentStep: 1,
        init() {
          window.addEventListener('cv-rambo:onboarding-step-2',(e)=>{this.profileData=e.detail.profileData;this.currentStep=2;this.validerFormulaire()});
          window.addEventListener('cv-rambo:onboarding-step-3',()=>{this.currentStep=3;this.demoIndex=0});
          window.addEventListener('cv-rambo:onboarding-complete',()=>this.currentStep=4);
          this.profileData={name:'',email:'',experiences:[],competences:[]};
        }
      }
    }
  </script>
</body>
</html>
