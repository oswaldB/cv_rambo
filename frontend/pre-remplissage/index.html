<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CV Rambo - Pré-remplissage</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="workflows/analyser-formulaire/code/index.js"></script>
  <script src="workflows/remplir-champs/code/index.js"></script>
  <script src="workflows/generer-script-soumission/code/index.js"></script>
  <script src="workflows/soumettre-formulaire/code/index.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto Condensed',sans-serif;background:linear-gradient(135deg,#2F4F4F,#0a0a0a);min-height:100vh;color:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:40px}</style>
</head>
<body x-data="{...workflowAnalyserFormulaire(),...workflowRemplirChamps(),...workflowGenererScriptSoumission(),...workflowSoumettreFormulaire()}">
  <div style="max-width:600px;width:100%">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:#FFD700;text-align:center;letter-spacing:4px">📝 PRÉ-REMPLISSAGE</h1>
    <p style="color:#2E8B57;text-align:center;margin-bottom:40px">Remplissage automatique</p>
    <div style="background:rgba(0,0,0,0.4);border:2px solid #FFD700;padding:30px">
      <button @click="analyserFormulaire()" style="width:100%;padding:20px;background:#2E8B57;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';font-size:18px;cursor:pointer;margin-bottom:15px">ANALYSER LE FORMULAIRE</button>
      <button @click="remplirChamps({name:'John',email:'john@email.com'})" style="width:100%;padding:20px;background:#2E8B57;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';font-size:18px;cursor:pointer;margin-bottom:15px">REMPLIR LES CHAMPS</button>
      <button @click="genererScript()" style="width:100%;padding:20px;background:#2E8B57;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';font-size:18px;cursor:pointer;margin-bottom:15px">GÉNÉRER SCRIPT</button>
      <button @click="soumettreFormulaire()" style="width:100%;padding:20px;background:#FF0000;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';font-size:18px;cursor:pointer">SOUMETTRE</button>
    </div>
  </div>
</body>
</html>
