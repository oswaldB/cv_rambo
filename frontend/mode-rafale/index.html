<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CV Rambo - Mode Rafale</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="workflows/selectionner-cibles/code/index.js"></script>
  <script src="workflows/configurer-rafale/code/index.js"></script>
  <script src="workflows/executer-rafale/code/index.js"></script>
  <script src="workflows/interrompre-rafale/code/index.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto Condensed',sans-serif;background:linear-gradient(135deg,#2F4F4F,#0a0a0a);min-height:100vh;color:#f5f5f5;padding:40px}</style>
</head>
<body x-data="{...workflowSelectionnerCibles(),...workflowConfigurerRafale(),...workflowExecuterRafale(),...workflowInterrompreRafale()}">
  <div style="max-width:1000px;margin:0 auto">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:#FFD700;text-align:center;letter-spacing:4px">⚡ MODE RAFALE</h1>
    <p style="color:#2E8B57;text-align:center;margin-bottom:40px">CANDIDATURES EN SÉRIE</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">
      <div style="background:rgba(0,0,0,0.4);border:2px solid #FFD700;padding:20px">
        <h3 style="color:#FFD700;font-family:'Bebas Neue'">1. SÉLECTIONNER</h3>
        <button @click="selectionnerCibles()" style="width:100%;margin-top:15px;padding:15px;background:#2E8B57;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';cursor:pointer">CHOISIR LES CIBLES</button>
      </div>
      <div style="background:rgba(0,0,0,0.4);border:2px solid #FFD700;padding:20px">
        <h3 style="color:#FFD700;font-family:'Bebas Neue'">2. CONFIGURER</h3>
        <button @click="configurerRafale({delay:5000})" style="width:100%;margin-top:15px;padding:15px;background:#2E8B57;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';cursor:pointer">PARAMÈTRES</button>
      </div>
      <div style="background:rgba(0,0,0,0.4);border:2px solid #FFD700;padding:20px">
        <h3 style="color:#FFD700;font-family:'Bebas Neue'">3. EXÉCUTER</h3>
        <button @click="executerRafale()" style="width:100%;margin-top:15px;padding:15px;background:#FF0000;border:2px solid #FFD700;color:white;font-family:'Bebas Neue';cursor:pointer">🔥 TIRER</button>
      </div>
    </div>
  </div>
</body>
</html>
