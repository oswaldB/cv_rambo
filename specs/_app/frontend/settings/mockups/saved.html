<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Saved</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: settings - saved -->
  
  <!-- Toast notification -->
  <div class="fixed top-4 left-1/2 -translate-x-1/2 bg-retro-green border-4 border-retro-black px-6 py-3 shadow-[4px_4px_0_0_#0d0d0d] z-50">
    <div class="flex items-center gap-3">
      <span class="text-xl">✓</span>
      
      <span class="font-pixel text-xs text-retro-black">PARAMETRES SAUVEGARDES!</span>
    </div>
  </div>
  
  <div class="fixed inset-0 bg-retro-dark flex flex-col">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b-4 border-retro-cream/20">
      <div class="flex items-center gap-3">
        <span class="text-2xl">⚙️</span>
        <h1 class="font-pixel text-sm text-retro-cream">PARAMETRES</h1>
      </div>
      <button class="text-retro-red font-pixel text-xs">[X]</button>
    </div>
    
    <!-- Content with saved indicator -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="bg-retro-black border-4 border-retro-green p-4">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-retro-green">✓</span>
          
          <h2 class="font-pixel text-xs text-retro-green">PARAMETRES A JOUR</h2>
        </div>
        
        <p class="text-sm text-retro-cream/70">
          Vos modifications ont ete sauvegardees avec succes.
        </p>
      </div>
      
      
      <div class="bg-retro-black border-4 border-retro-cream/30 p-4">
        <h2 class="font-pixel text-xs text-retro-purple mb-4">INTELLIGENCE ARTIFICIELLE</h2>
        
        <div class="space-y-4">
          <div>
            <label class="block font-pixel text-xs text-retro-cream mb-2">OLLAMA URL</label>
            
            <input type="text" value="http://localhost:11434" 
              class="w-full px-3 py-2 bg-retro-cream/10 border-4 border-retro-cream/30 text-retro-cream text-lg font-pixel-body">
          </div>
        </div>
      </div>
      
      
      <div class="bg-retro-black border-4 border-retro-cream/30 p-4">
        <h2 class="font-pixel text-xs text-retro-blue mb-4">INTERFACE</h2>
        
        <div class="flex items-center justify-between">
          <span>Theme retro 80s</span>
          
          <div class="w-12 h-6 bg-retro-green relative border-2 border-retro-black">
            <div class="absolute right-0.5 top-0.5 w-4 h-4 bg-retro-cream"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
