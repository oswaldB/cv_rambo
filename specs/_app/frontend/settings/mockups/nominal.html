<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Settings - Nominal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Inter', 'sans-serif'],
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-gray-900 text-white font-sans min-h-screen">
        <!-- Mockup: settings - nominal -->

        <div class="fixed inset-0 bg-gray-900 flex flex-col">
            <!-- Header -->
            <div
                class="flex items-center justify-between p-4 border-b-2 border-gray-700"
            >
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚙️</span>
                    <h1 class="font-bold text-lg text-white">
                        PARAMETRES
                    </h1>
                </div>
                <button class="text-red-400 font-bold text-xs">[X]</button>
            </div>

            <!-- Settings list -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Section: IA -->
                <div class="bg-gray-800 border-2 border-gray-600 rounded-lg p-4">
                    <h2 class="font-bold text-sm text-purple-400 mb-4">
                        INTELLIGENCE ARTIFICIELLE
                    </h2>

                    <div class="space-y-4">
                        <div>
                            <label
                                class="block font-bold text-xs text-white mb-2"
                                >OLLAMA URL</label
                            >

                            <input
                                type="text"
                                value="http://localhost:11434"
                                class="w-full px-3 py-2 bg-gray-700 border-2 border-gray-500 text-white text-sm focus:outline-none focus:border-blue-500 rounded"
                            />
                        </div>

                        <div>
                            <label
                                class="block font-bold text-xs text-white mb-2"
                                >MODELE</label
                            >

                            <select
                                class="w-full px-3 py-2 bg-gray-700 border-2 border-gray-500 text-white text-sm focus:outline-none focus:border-blue-500 rounded"
                            >
                                <option>llama3.2:3b</option>
                                <option>llama3.1:8b</option>
                                <option>mistral</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Section: Interface -->

                <div class="bg-gray-800 border-2 border-gray-600 rounded-lg p-4">
                    <h2 class="font-bold text-sm text-blue-400 mb-4">
                        INTERFACE
                    </h2>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span>Mode compact</span>

                            <div
                                class="w-12 h-6 bg-green-600 relative border-2 border-gray-800 rounded-full"
                            >
                                <div
                                    class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"
                                ></div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <span>Effets sonores</span>

                            <div
                                class="w-12 h-6 bg-green-600 relative border-2 border-gray-800 rounded-full"
                            >
                                <div
                                    class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"
                                ></div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <span>Animations</span>

                            <div
                                class="w-12 h-6 bg-green-600 relative border-2 border-gray-800 rounded-full"
                            >
                                <div
                                    class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Data -->

                <div class="bg-gray-800 border-2 border-gray-600 rounded-lg p-4">
                    <h2 class="font-bold text-sm text-yellow-400 mb-4">DONNEES</h2>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <div>
                                <p>Stockage local</p>

                                <p class="text-xs text-gray-400">
                                    1.2 Mo / 5 Mo
                                </p>
                            </div>

                            <button
                                class="px-3 py-1 border-2 border-gray-500 text-xs hover:border-red-400 hover:text-red-400 rounded"
                            >
                                VIDER
                            </button>
                        </div>

                        <div>
                            <button
                                class="w-full px-4 py-2 border-2 border-gray-500 text-left hover:bg-gray-700 rounded flex items-center gap-2 transition-colors"
                            >
                                <span>📤</span> Exporter les données →
                            </button>
                        </div>

                        <div>
                            <button
                                class="w-full px-4 py-2 border-2 border-gray-500 text-left hover:bg-gray-700 rounded flex items-center gap-2 transition-colors"
                            >
                                <span>📥</span> Importer des données →
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Section: About -->

                <div class="bg-gray-800 border-2 border-gray-600 rounded-lg p-4">
                    <h2 class="font-bold text-xs text-gray-400 mb-4">
                        A PROPOS
                    </h2>

                    <div class="text-sm text-gray-300">
                        <p>CV Rambo v1.0.0</p>

                        <p class="mt-1">
                            Extension Chrome pour gérer ses candidatures
                        </p>

                        <p class="mt-2 text-gray-500">
                            © 2026 - Open Source
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
