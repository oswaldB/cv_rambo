<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export CV - Success</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: export-cv - success -->
  
  <!-- Overlay Container -->
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <!-- Retro Panel -->
    <div class="bg-retro-dark border-4 border-retro-cream p-6 shadow-[8px_8px_0_0_#0d0d0d] max-w-lg w-full">
      
      <!-- Success Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-retro-green border-4 border-retro-cream mb-4 shadow-[4px_4px_0_0_#0d0d0d]">
          <span class="text-4xl">✓</span>
        </div>
        <h1 class="font-pixel text-retro-green text-sm">MISSION ACCOMPLIE!</h1>
      </div>
      
      <!-- File Info -->
      <div class="bg-retro-black border-2 border-retro-green p-4 mb-6">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-retro-blue flex items-center justify-center border-2 border-retro-cream">
            <span class="font-pixel text-retro-cream text-xs">W</span>
          </div>
          <div class="flex-1">
            <p class="font-pixel text-retro-cream text-xs">CV_Export_2026.docx</p>
            <p class="text-retro-cream/60 text-base">42 Ko • Prêt au téléchargement</p>
          </div>
        </div>
        
        <!-- File Details -->
        <div class="mt-4 pt-4 border-t-2 border-retro-cream/30 space-y-1 text-base">
          <div class="flex justify-between">
            <span class="text-retro-cream/60">Pages:</span>
            <span class="text-retro-cream">2</span>
          </div>
          <div class="flex justify-between">
            <span class="text-retro-cream/60">Format:</span>
            <span class="text-retro-cream">.docx (Word 2007+)</span>
          </div>
          <div class="flex justify-between">
            <span class="text-retro-cream/60">Compatibilité:</span>
            <span class="text-retro-green">ATS ✓</span>
          </div>
        </div>
      </div>
      
      <!-- Action Buttons -->
      <div class="space-y-3">
        <!-- Download Button -->
        <a href="#" class="block w-full py-4 bg-retro-green text-retro-black font-pixel text-sm border-4 border-retro-cream text-center hover:bg-retro-cream hover:text-retro-green transition-all shadow-[4px_4px_0_0_#f0f0d8] hover:shadow-[2px_2px_0_0_#f0f0d8] hover:translate-x-0.5 hover:translate-y-0.5">
          ⬇ TELECHARGER LE CV
        </a>
        
        <!-- Preview Button -->
        <button class="w-full py-3 bg-retro-blue text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-cream hover:text-retro-blue transition-colors">
          👁 APERÇU RAPIDE
        </button>
        
        <!-- Back Button -->
        <button class="w-full py-2 text-retro-cream/60 font-pixel text-xs hover:text-retro-cream transition-colors">
          ← RETOUR A L'ARSENAL
        </button>
      </div>
      
      <!-- Tips -->
      <div class="mt-6 p-3 bg-retro-yellow/20 border-2 border-retro-yellow">
        <p class="text-retro-yellow text-base flex items-start gap-2">
          <span>💡</span>
          <span>Astuce: Personnalisez votre CV pour chaque offre avec le Mode Journaliste!</span>
        </p>
      </div>
    </div>
  </div>
  
  <!-- CRT Scanlines Effect -->
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
