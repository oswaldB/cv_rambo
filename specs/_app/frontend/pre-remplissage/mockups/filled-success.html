<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-remplissage - Filled Success</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: pre-remplissage - filled-success -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-green p-6 shadow-[8px_8px_0_0_#2ecc71] max-w-2xl w-full">
      
      <!-- Success Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-retro-green border-4 border-retro-cream mb-4 shadow-[4px_4px_0_0_#0d0d0d]">
          <span class="text-4xl">✓</span>
        </div>
        <h1 class="font-pixel text-retro-green text-sm">INJECTION REUSSIE!</h1>
        <p class="text-retro-cream/70 text-lg mt-2">Formulaire pré-rempli avec succès</p>
      </div>
      
      <!-- Results -->
      <div class="bg-retro-black border-2 border-retro-green p-4 mb-6">
        <h3 class="font-pixel text-retro-cream/50 text-xs mb-3">RECAPITULATIF:</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="text-center p-3 bg-retro-dark border border-retro-green">
            <p class="font-pixel text-retro-green text-2xl">8</p>
            <p class="text-retro-cream/60 text-sm">Champs remplis auto</p>
          </div>
          <div class="text-center p-3 bg-retro-dark border border-retro-cream/30">
            <p class="font-pixel text-retro-cream text-2xl">4</p>
            <p class="text-retro-cream/60 text-sm">Champs manuels</p>
          </div>
        </div>
      </div>
      
      <!-- Manual Fields Warning -->
      <div class="bg-retro-yellow/20 border-2 border-retro-yellow p-4 mb-6">
        <div class="flex items-start gap-2">
          <span class="text-retro-yellow">⚠</span>
          <div>
            <p class="font-pixel text-retro-yellow text-xs mb-1">CHAMPS A COMPLETER:</p>
            <ul class="text-retro-cream/80 text-sm space-y-1">
              <li>• Salaire souhaité</li>
              <li>• Date de disponibilité</li>
              <li>• Message de motivation</li>
              <li>• Pièce jointe CV</li>
            </ul>
          </div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="space-y-3">
        <button class="w-full py-4 bg-retro-blue text-retro-cream font-pixel text-sm border-4 border-retro-cream hover:bg-retro-cream hover:text-retro-blue transition-all shadow-[4px_4px_0_0_#f0f0d8]">
          📤 SOUMETTRE LE FORMULAIRE
        </button>
        
        <div class="flex gap-3">
          <button class="flex-1 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-orange transition-colors">
            ✏️ MODIFIER
          </button>
          <button class="flex-1 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-red transition-colors">
            ↩️ ANNULER
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
