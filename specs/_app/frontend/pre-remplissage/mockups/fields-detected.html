<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-remplissage - Fields Detected</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: pre-remplissage - fields-detected -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-green p-6 shadow-[8px_8px_0_0_#2ecc71] max-w-2xl w-full">
      
      <!-- Header -->
      <div class="flex items-center justify-between mb-6 border-b-4 border-retro-cream pb-4">
        <h1 class="font-pixel text-retro-green text-sm tracking-tight">CHAMPS DETECTES</h1>
        <span class="text-retro-cream/50 font-pixel text-xs">[READY]</span>
      </div>
      
      <!-- Summary -->
      <div class="bg-retro-black border-2 border-retro-green p-4 mb-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="font-pixel text-retro-green text-xl">12/12</p>
            <p class="text-retro-cream/60 text-base">Champs identifiés</p>
          </div>
          <div class="text-right">
            <p class="font-pixel text-retro-green text-xl">10</p>
            <p class="text-retro-cream/60 text-base">Remplissables auto</p>
          </div>
        </div>
      </div>
      
      <!-- Fields List -->
      <div class="bg-retro-black border-2 border-retro-cream p-4 mb-6 max-h-64 overflow-y-auto">
        <h3 class="font-pixel text-retro-cream/50 text-xs mb-3">MAPPING DES CHAMPS:</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-green">
            <span class="text-retro-cream/70">Prénom</span>
            <span class="text-retro-green">✓ Profil.prénom</span>
          </div>
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-green">
            <span class="text-retro-cream/70">Nom</span>
            <span class="text-retro-green">✓ Profil.nom</span>
          </div>
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-green">
            <span class="text-retro-cream/70">Email</span>
            <span class="text-retro-green">✓ Profil.email</span>
          </div>
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-green">
            <span class="text-retro-cream/70">Téléphone</span>
            <span class="text-retro-green">✓ Profil.tel</span>
          </div>
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-green">
            <span class="text-retro-cream/70">LinkedIn</span>
            <span class="text-retro-green">✓ Profil.linkedin</span>
          </div>
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-cream/30">
            <span class="text-retro-cream/70">Salaire souhaité</span>
            <span class="text-retro-cream/50">? Manuel</span>
          </div>
          <div class="flex justify-between items-center p-2 bg-retro-dark border border-retro-cream/30">
            <span class="text-retro-cream/70">Message motivation</span>
            <span class="text-retro-cream/50">? Manuel</span>
          </div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="space-y-3">
        <button class="w-full py-4 bg-retro-green text-retro-black font-pixel text-sm border-4 border-retro-cream hover:bg-retro-cream transition-all shadow-[4px_4px_0_0_#f0f0d8]">
          🚀 INJECTER LES DONNÉES
        </button>
        
        <div class="flex gap-3">
          <button class="flex-1 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-blue transition-colors">
            ⚙ CONFIGURER
          </button>
          <button class="flex-1 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-orange transition-colors">
            👁 PRÉVISUALISER
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
