<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-remplissage - Submitting</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: pre-remplissage - submitting -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-purple p-6 shadow-[8px_8px_0_0_#9b59b6] max-w-lg w-full text-center">
      
      <!-- Header -->
      <h1 class="font-pixel text-retro-purple text-sm mb-6">SOUMISSION EN COURS</h1>
      
      <!-- Rocket Animation -->
      <div class="py-8">
        <div class="inline-block relative">
          <div class="text-6xl animate-bounce">🚀</div>
          <div class="absolute -bottom-4 left-1/2 -translate-x-1/2">
            <div class="flex gap-1">
              <span class="text-retro-orange animate-pulse">▲</span>
              <span class="text-retro-red animate-pulse" style="animation-delay: 0.1s;">▲</span>
              <span class="text-retro-yellow animate-pulse" style="animation-delay: 0.2s;">▲</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Status -->
      <p class="font-pixel text-retro-purple text-sm animate-pulse mb-2">ENVOI DE LA CANDIDATURE...</p>
      <p class="text-retro-cream/60 text-base">Veuillez patienter</p>
      
      <!-- Progress Dots -->
      <div class="flex justify-center gap-2 mt-6">
        <div class="w-3 h-3 bg-retro-purple animate-pulse"></div>
        <div class="w-3 h-3 bg-retro-purple animate-pulse" style="animation-delay: 0.2s;"></div>
        <div class="w-3 h-3 bg-retro-purple animate-pulse" style="animation-delay: 0.4s;"></div>
      </div>
      
      <!-- Cancel -->
      <button class="mt-8 py-2 px-4 bg-retro-dark text-retro-cream/60 font-pixel text-xs border border-retro-cream/30 hover:text-retro-cream hover:border-retro-cream transition-colors">
        ANNULER
      </button>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
