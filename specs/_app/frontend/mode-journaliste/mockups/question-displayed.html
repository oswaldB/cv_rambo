<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mode Journaliste - Question</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            rambo: {
                                red: "#FF0000",
                                green: "#2E8B57",
                                gray: "#2F4F4F",
                                gold: "#FFD700",
                            },
                            retro: { black: "#0d0d0d", cream: "#f0f0d8" },
                        },
                        fontFamily: { pixel: ['"Press Start 2P"', "cursive"] },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-retro-black text-retro-cream min-h-screen">
        <!-- Mockup: mode-journaliste - question-displayed -->
        <div class="fixed inset-0 flex items-center justify-center p-4">
            <div
                class="border-4 border-rambo-blue bg-retro-cream text-retro-black p-6 max-w-lg shadow-[4px_4px_0_0_#0d0d0d]"
            >
                <div
                    class="flex justify-between items-center mb-4 border-b-2 border-rambo-gray pb-2"
                >
                    <span class="font-pixel text-xs">QUESTION 1/5</span>
                    <button class="text-rambo-red font-pixel">✕</button>
                </div>

                <div class="border-2 border-rambo-gold p-4 mb-4 bg-white">
                    <p class="font-pixel text-xs mb-2 text-rambo-gray">
                        L'IA demande :
                    </p>
                    <p class="text-sm">
                        Parlez-moi de votre plus grande réussite professionnelle
                        chez TechCorp. Quel défi avez-vous relevé et comment ?
                    </p>
                </div>

                <div class="mb-4">
                    <label class="font-pixel text-xs block mb-2"
                        >VOTRE RÉPONSE</label
                    >
                    <textarea
                        class="w-full border-2 border-rambo-gray p-3 font-sans h-24"
                        placeholder="Décrivez votre expérience..."
                    ></textarea>
                </div>

                <div class="flex gap-3">
                    <button
                        class="flex-1 bg-rambo-gray text-white py-3 font-pixel text-xs border-2 border-retro-black"
                    >
                        PASSER
                    </button>
                    <button
                        class="flex-1 bg-rambo-blue text-white py-3 font-pixel text-xs border-2 border-retro-black"
                    >
                        ENVOYER
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
