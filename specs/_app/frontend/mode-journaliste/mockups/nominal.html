<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Journaliste - Nominal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen">
  <!-- Mockup: mode-journaliste - nominal -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="border-4 border-rambo-gold bg-retro-cream text-retro-black p-6 max-w-lg shadow-[4px_4px_0_0_#0d0d0d]">
      <div class="flex justify-between items-center mb-6 border-b-2 border-rambo-gray pb-2">
        <h2 class="font-pixel text-sm">🎙️ MODE JOURNALISTE</h2>
        <button class="text-rambo-red font-pixel">✕</button>
      </div>
      
      <div class="text-center py-8">
        <div class="text-5xl mb-4">🎤</div>
        <p class="text-rambo-gray mb-6">L'IA va vous poser des questions pour enrichir votre CV.</p>
        
        <button class="bg-rambo-green text-white px-8 py-4 font-pixel text-sm border-2 border-retro-black hover:shadow-[2px_2px_0_0_#0d0d0d] active:translate-y-0.5">
          LANCER LA SESSION
        </button>
      </div>
      
      <div class="mt-6 border-2 border-rambo-gray p-3 bg-white">
        <p class="text-xs text-rambo-gray">💡 Conseil : répondez spontanément, l'IA reformulera vos réponses.</p>
      </div>
    </div>
  </div>
</body>
</html>
