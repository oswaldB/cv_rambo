<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Rafale - Processing</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: mode-rafale - processing -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-yellow p-6 shadow-[8px_8px_0_0_#f1c40f] max-w-2xl w-full">
      
      <!-- Header -->
      <div class="flex items-center justify-between mb-6 border-b-4 border-retro-cream pb-4">
        <div class="flex items-center gap-3">
          <span class="text-retro-yellow animate-spin">⟳</span>
          <h1 class="font-pixel text-retro-yellow text-sm tracking-tight">TRAITEMENT...</h1>
        </div>
        <span class="text-retro-cream/50 font-pixel text-xs">[#3/5]</span>
      </div>
      
      <!-- Target Card -->
      <div class="bg-retro-black border-2 border-retro-yellow p-4 mb-6">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 bg-retro-yellow flex items-center justify-center border-2 border-retro-cream">
            <span class="font-pixel text-retro-black text-xs">#3</span>
          </div>
          <div class="flex-1">
            <p class="font-pixel text-retro-cream text-sm">Frontend Engineer</p>
            <p class="text-retro-cream/70 text-lg">StartupXYZ • Lyon • CDI</p>
            <div class="flex gap-2 mt-2">
              <span class="px-2 py-1 bg-retro-blue/30 border border-retro-blue text-retro-blue text-xs">React</span>
              <span class="px-2 py-1 bg-retro-purple/30 border border-retro-purple text-retro-purple text-xs">Remote</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Processing Steps -->
      <div class="bg-retro-black border-2 border-retro-cream p-4 mb-6">
        <h3 class="font-pixel text-retro-cream/50 text-xs mb-4">ETAPES EN COURS</h3>
        <div class="space-y-3">
          <div class="flex items-center gap-3">
            <span class="w-6 h-6 bg-retro-green flex items-center justify-center text-retro-black text-xs">✓</span>
            <span class="text-retro-green">Analyse de la page</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="w-6 h-6 bg-retro-green flex items-center justify-center text-retro-black text-xs">✓</span>
            <span class="text-retro-green">Détection formulaire</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="w-6 h-6 bg-retro-yellow border-2 border-retro-cream animate-pulse flex items-center justify-center text-retro-cream text-xs">▶</span>
            <span class="text-retro-yellow">Pré-remplissage champs</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="w-6 h-6 bg-retro-dark border-2 border-retro-cream/30 flex items-center justify-center text-retro-cream/30 text-xs">○</span>
            <span class="text-retro-cream/30">Vérification</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="w-6 h-6 bg-retro-dark border-2 border-retro-cream/30 flex items-center justify-center text-retro-cream/30 text-xs">○</span>
            <span class="text-retro-cream/30">Soumission</span>
          </div>
        </div>
      </div>
      
      <!-- AI Status -->
      <div class="bg-retro-blue/20 border-2 border-retro-blue p-3 mb-6">
        <div class="flex items-center gap-2">
          <span class="animate-pulse">🤖</span>
          <span class="text-retro-blue text-base">Ollama analyse les champs...</span>
        </div>
      </div>
      
      <!-- Spinner -->
      <div class="flex justify-center mb-6">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-retro-yellow animate-bounce"></div>
          <div class="w-3 h-3 bg-retro-yellow animate-bounce" style="animation-delay: 0.1s;"></div>
          <div class="w-3 h-3 bg-retro-yellow animate-bounce" style="animation-delay: 0.2s;"></div>
        </div>
      </div>
      
      <!-- Cancel -->
      <button class="w-full py-3 bg-retro-red/80 text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-red transition-colors">
        ✕ ANNULER CETTE CIBLE
      </button>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
