<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Rafale - Completed</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: mode-rafale - completed -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-green p-6 shadow-[8px_8px_0_0_#2ecc71] max-w-2xl w-full">
      
      <!-- Victory Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-retro-green border-4 border-retro-cream mb-4 shadow-[4px_4px_0_0_#0d0d0d]">
          <span class="text-5xl">🏆</span>
        </div>
        <h1 class="font-pixel text-retro-green text-lg">MISSION ACCOMPLIE!</h1>
        <p class="text-retro-cream/70 text-lg mt-2">Toutes les cibles ont été traitées</p>
      </div>
      
      <!-- Final Score -->
      <div class="bg-retro-black border-4 border-retro-cream p-6 mb-6 text-center">
        <p class="font-pixel text-retro-yellow text-xs mb-4">SCORE FINAL</p>
        <div class="flex justify-center items-center gap-4">
          <div class="text-center">
            <p class="text-4xl font-pixel text-retro-green">4</p>
            <p class="text-retro-cream/50 text-sm">SUCCES</p>
          </div>
          <span class="text-2xl text-retro-cream">/</span>
          <div class="text-center">
            <p class="text-4xl font-pixel text-retro-red">1</p>
            <p class="text-retro-cream/50 text-sm">ECHEC</p>
          </div>
        </div>
        <div class="mt-4 pt-4 border-t-2 border-retro-cream/30">
          <p class="text-retro-cream/50 text-sm">TAUX DE REUSSITE</p>
          <p class="text-3xl font-pixel text-retro-green">80%</p>
        </div>
      </div>
      
      <!-- Summary -->
      <div class="bg-retro-black border-2 border-retro-cream p-4 mb-6">
        <h3 class="font-pixel text-retro-cream/50 text-xs mb-3">RESUME DE LA MISSION</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between">
            <span class="text-retro-cream/70">Temps total:</span>
            <span class="text-retro-cream">00:47</span>
          </div>
          <div class="flex justify-between">
            <span class="text-retro-cream/70">Moyenne par cible:</span>
            <span class="text-retro-cream">9.4s</span>
          </div>
          <div class="flex justify-between">
            <span class="text-retro-cream/70">Formul. auto-remplis:</span>
            <span class="text-retro-green">5/5</span>
          </div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="space-y-3">
        <button class="w-full py-4 bg-retro-green text-retro-black font-pixel text-sm border-4 border-retro-cream hover:bg-retro-cream transition-all shadow-[4px_4px_0_0_#f0f0d8]">
          📊 VOIR LES RESULTATS
        </button>
        
        <button class="w-full py-3 bg-retro-blue text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-cream hover:text-retro-blue transition-colors">
          🔥 NOUVELLE RAFALE
        </button>
        
        <button class="w-full py-2 text-retro-cream/60 font-pixel text-xs hover:text-retro-cream">
          ← RETOUR AU KANBAN
        </button>
      </div>
      
      <!-- Achievement -->
      <div class="mt-6 p-3 bg-retro-yellow/20 border-2 border-retro-yellow text-center">
        <p class="text-retro-yellow text-sm font-pixel">🏅 BADGE DEBLOQUE: RAFALE NIVEAU 1</p>
      </div>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
