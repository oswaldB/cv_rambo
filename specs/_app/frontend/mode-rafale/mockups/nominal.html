<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Rafale - Nominal</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: mode-rafale - nominal -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-cream p-6 shadow-[8px_8px_0_0_#0d0d0d] max-w-2xl w-full">
      
      <!-- Header -->
      <div class="flex items-center justify-between mb-6 border-b-4 border-retro-cream pb-4">
        <h1 class="font-pixel text-retro-red text-sm tracking-tight">MODE RAFALE</h1>
        <span class="text-retro-cream/50 font-pixel text-xs">[CONFIG]</span>
      </div>
      
      <!-- Stats Bar -->
      <div class="bg-retro-black border-2 border-retro-cream p-3 mb-6">
        <div class="flex justify-between items-center">
          <div class="text-center">
            <p class="text-retro-cream/50 text-sm">CIBLES EN ATTENTE</p>
            <p class="font-pixel text-retro-yellow text-xl">24</p>
          </div>
          <div class="text-center">
            <p class="text-retro-cream/50 text-sm">TRAITEES</p>
            <p class="font-pixel text-retro-green text-xl">0</p>
          </div>
          <div class="text-center">
            <p class="text-retro-cream/50 text-sm">ECHECS</p>
            <p class="font-pixel text-retro-red text-xl">0</p>
          </div>
        </div>
      </div>
      
      <!-- Configuration -->
      <div class="space-y-6">
        <!-- Nombre de cibles -->
        <div class="bg-retro-black border-2 border-retro-cream p-4">
          <label class="font-pixel text-retro-blue text-xs block mb-3">NOMBRE DE CIBLES</label>
          <div class="flex items-center gap-4">
            <button class="w-12 h-12 bg-retro-dark border-2 border-retro-cream hover:bg-retro-cream hover:text-retro-dark font-pixel">-</button>
            <span class="font-pixel text-2xl text-retro-cream">10</span>
            <button class="w-12 h-12 bg-retro-dark border-2 border-retro-cream hover:bg-retro-cream hover:text-retro-dark font-pixel">+</button>
            <button class="px-4 py-2 bg-retro-purple text-retro-cream border-2 border-retro-cream font-pixel text-xs">ALL</button>
          </div>
        </div>
        
        <!-- Délai entre tirs -->
        <div class="bg-retro-black border-2 border-retro-cream p-4">
          <label class="font-pixel text-retro-blue text-xs block mb-3">DELAI ENTRE TIRS</label>
          <div class="flex items-center gap-4">
            <input type="range" min="1" max="10" value="3" class="flex-1 accent-retro-green">
            <span class="font-pixel text-retro-cream text-sm w-16">3s</span>
          </div>
          <div class="flex justify-between text-xs text-retro-cream/50 mt-2">
            <span>Rapide</span>
            <span>Lent</span>
          </div>
        </div>
        
        <!-- Mode -->
        <div class="bg-retro-black border-2 border-retro-cream p-4">
          <label class="font-pixel text-retro-blue text-xs block mb-3">MODE DE TIR</label>
          <div class="flex gap-3">
            <button class="flex-1 py-3 bg-retro-green text-retro-black font-pixel text-xs border-2 border-retro-cream">AUTO</button>
            <button class="flex-1 py-3 bg-retro-dark text-retro-cream/50 font-pixel text-xs border-2 border-retro-cream/50">MANUEL</button>
          </div>
        </div>
      </div>
      
      <!-- Launch Button -->
      <button class="w-full mt-6 py-5 bg-retro-red text-retro-cream font-pixel text-lg border-4 border-retro-cream hover:bg-retro-orange transition-all shadow-[4px_4px_0_0_#f0f0d8] hover:shadow-[2px_2px_0_0_#f0f0d8] hover:translate-x-0.5 hover:translate-y-0.5">
        🔥 LANCER LA RAFALE
      </button>
      
      <!-- Warning -->
      <p class="text-center text-retro-cream/50 text-base mt-4">
        ⚠️ Vérifiez vos munitions (CV) avant le tir
      </p>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
