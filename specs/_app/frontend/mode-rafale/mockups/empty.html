<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Rafale - Empty</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: mode-rafale - empty -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-orange p-6 shadow-[8px_8px_0_0_#e67e22] max-w-lg w-full">
      
      <!-- Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-retro-orange border-4 border-retro-cream mb-4">
          <span class="text-4xl">📭</span>
        </div>
        <h1 class="font-pixel text-retro-orange text-sm">AUCUNE CIBLE</h1>
        <p class="text-retro-cream/70 text-lg mt-2">Le kanban est vide</p>
      </div>
      
      <!-- Empty State -->
      <div class="bg-retro-black border-2 border-retro-orange p-4 mb-6">
        <div class="text-center space-y-4">
          <div class="py-8">
            <p class="text-retro-cream/40 text-6xl mb-4">○ ○ ○</p>
            <p class="text-retro-cream/50 text-lg">Aucune offre dans le kanban</p>
          </div>
          
          <div class="space-y-2 text-base text-retro-cream/60">
            <p>Statut "À postuler": 0</p>
            <p>Statut "En cours": 0</p>
            <p>Statut "Relance": 0</p>
          </div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="space-y-3">
        <button class="w-full py-4 bg-retro-blue text-retro-cream font-pixel text-sm border-4 border-retro-cream hover:bg-retro-cream hover:text-retro-blue transition-all shadow-[4px_4px_0_0_#f0f0d8]">
          🔍 CAPTURER DES OFFRES
        </button>
        
        <button class="w-full py-3 bg-retro-purple text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-cream hover:text-retro-purple transition-colors">
          📋 VOIR LE KANBAN
        </button>
        
        <button class="w-full py-2 text-retro-cream/60 font-pixel text-xs hover:text-retro-cream">
          ← RETOUR
        </button>
      </div>
      
      <!-- Tip -->
      <div class="mt-6 p-3 bg-retro-green/20 border-2 border-retro-green">
        <p class="text-retro-green text-base flex items-start gap-2">
          <span>💡</span>
          <span>Utilisez la capture d'offre sur LinkedIn ou WTTJ pour remplir votre kanban!</span>
        </p>
      </div>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
