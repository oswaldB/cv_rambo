<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Rafale - Target Success</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: mode-rafale - target-success -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-green p-6 shadow-[8px_8px_0_0_#2ecc71] max-w-2xl w-full">
      
      <!-- Success Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-retro-green border-4 border-retro-cream mb-4 shadow-[4px_4px_0_0_#0d0d0d] animate-bounce">
          <span class="text-4xl">✓</span>
        </div>
        <h1 class="font-pixel text-retro-green text-sm">TIR REUSSI!</h1>
        <p class="text-retro-cream/70 text-lg mt-2">Cible neutralisée avec succès</p>
      </div>
      
      <!-- Success Details -->
      <div class="bg-retro-black border-2 border-retro-green p-4 mb-6">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 bg-retro-green flex items-center justify-center border-2 border-retro-cream">
            <span class="font-pixel text-retro-black text-xs">#2</span>
          </div>
          <div class="flex-1">
            <p class="font-pixel text-retro-cream text-sm">Développeur Full Stack</p>
            <p class="text-retro-cream/70 text-base">TechCorp • Paris</p>
            <div class="mt-2 p-2 bg-retro-green/20 border border-retro-green">
              <p class="text-retro-green text-sm">✓ Candidature envoyée</p>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-retro-black border-2 border-retro-cream p-3 text-center">
          <p class="text-retro-cream/50 text-xs">TRAITEES</p>
          <p class="font-pixel text-retro-green text-xl">2</p>
        </div>
        <div class="bg-retro-black border-2 border-retro-cream p-3 text-center">
          <p class="text-retro-cream/50 text-xs">RESTANTES</p>
          <p class="font-pixel text-retro-yellow text-xl">3</p>
        </div>
        <div class="bg-retro-black border-2 border-retro-cream p-3 text-center">
          <p class="text-retro-cream/50 text-xs">SUCCESS</p>
          <p class="font-pixel text-retro-green text-xl">100%</p>
        </div>
      </div>
      
      <!-- Next Target Preview -->
      <div class="bg-retro-black border-2 border-retro-cream/50 p-4 mb-6">
        <p class="text-retro-cream/50 text-sm mb-2">PROCHAINE CIBLE DANS 3s...</p>
        <div class="flex items-center gap-3 opacity-70">
          <div class="w-10 h-10 bg-retro-dark flex items-center justify-center border border-retro-cream/30">
            <span class="font-pixel text-retro-cream/50 text-xs">#3</span>
          </div>
          <div>
            <p class="text-retro-cream text-base">Frontend Engineer - StartupXYZ</p>
          </div>
        </div>
        <!-- Countdown bar -->
        <div class="mt-3 bg-retro-dark h-2">
          <div class="h-full bg-retro-yellow animate-pulse" style="width: 60%;"></div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="flex gap-3">
        <button class="flex-1 py-3 bg-retro-green text-retro-black font-pixel text-xs border-2 border-retro-cream">
          ▶ CONTINUER
        </button>
        
        <button class="px-4 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-red hover:text-retro-cream transition-colors">
          ⏹ PAUSE
        </button>
      </div>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
