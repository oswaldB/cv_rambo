<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode Rafale - Paused</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              purple: '#9b59b6',
              orange: '#e67e22',
              dark: '#2c3e50',
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-black text-retro-cream font-pixel-body min-h-screen flex items-center justify-center p-4">
  <!-- Mockup: mode-rafale - paused -->
  
  <div class="fixed inset-0 bg-retro-black bg-opacity-95 flex items-center justify-center z-50 p-4">
    <div class="bg-retro-dark border-4 border-retro-yellow p-6 shadow-[8px_8px_0_0_#f1c40f] max-w-2xl w-full">
      
      <!-- Paused Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-retro-yellow border-4 border-retro-cream mb-4">
          <span class="text-4xl">⏸</span>
        </div>
        <h1 class="font-pixel text-retro-yellow text-sm">RAFALE EN PAUSE</h1>
        <p class="text-retro-cream/70 text-lg mt-2">Séquence interrompue</p>
      </div>
      
      <!-- Progress Summary -->
      <div class="bg-retro-black border-2 border-retro-cream p-4 mb-6">
        <div class="flex justify-between items-center mb-4">
          <span class="font-pixel text-retro-cream text-xs">PROGRESSION</span>
          <span class="font-pixel text-retro-green text-sm">3/5</span>
        </div>
        <div class="bg-retro-dark h-4 border border-retro-cream">
          <div class="h-full bg-retro-green" style="width: 60%;"></div>
        </div>
      </div>
      
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-retro-black border-2 border-retro-green p-3 text-center">
          <p class="text-retro-cream/50 text-xs">SUCCES</p>
          <p class="font-pixel text-retro-green text-xl">3</p>
        </div>
        <div class="bg-retro-black border-2 border-retro-red p-3 text-center">
          <p class="text-retro-cream/50 text-xs">ECHECS</p>
          <p class="font-pixel text-retro-red text-xl">0</p>
        </div>
        <div class="bg-retro-black border-2 border-retro-yellow p-3 text-center">
          <p class="text-retro-cream/50 text-xs">RESTANTES</p>
          <p class="font-pixel text-retro-yellow text-xl">2</p>
        </div>
      </div>
      
      <!-- Remaining Targets -->
      <div class="bg-retro-black border-2 border-retro-cream/50 p-4 mb-6">
        <h3 class="font-pixel text-retro-cream/50 text-xs mb-3">CIBLES EN ATTENTE</h3>
        <div class="space-y-2">
          <div class="flex items-center gap-3 p-2 bg-retro-dark opacity-50">
            <span class="text-retro-cream/30">○</span>
            <span class="text-retro-cream/50 text-sm">Développeur JS - Consulting</span>
          </div>
          <div class="flex items-center gap-3 p-2 bg-retro-dark opacity-50">
            <span class="text-retro-cream/30">○</span>
            <span class="text-retro-cream/50 text-sm">Software Engineer - BigTech</span>
          </div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="space-y-3">
        <button class="w-full py-4 bg-retro-green text-retro-black font-pixel text-sm border-4 border-retro-cream hover:bg-retro-cream transition-all shadow-[4px_4px_0_0_#f0f0d8]">
          ▶ REPRENDRE LA RAFALE
        </button>
        
        <div class="flex gap-3">
          <button class="flex-1 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-2 border-retro-cream hover:bg-retro-orange transition-colors">
            ⚙ MODIFIER CONFIG
          </button>
          
          <button class="flex-1 py-3 bg-retro-red text-retro-cream font-pixel text-xs border-2 border-retro-cream">
            ⏹ TERMINER
          </button>
        </div>
      </div>
      
      <!-- Info -->
      <p class="text-center text-retro-cream/50 text-sm mt-4">
        Les cibles déjà traitées restent dans "Candidatures envoyées"
      </p>
    </div>
  </div>
  
  <div class="fixed inset-0 pointer-events-none opacity-10 z-[60]"
       style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);">
  </div>
</body>
</html>
