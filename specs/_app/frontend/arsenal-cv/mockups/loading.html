<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsenal CV - Loading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen flex items-center justify-center">
  <!-- Mockup: arsenal-cv - loading -->
  <div class="text-center">
    <div class="text-4xl mb-4">⏳</div>
    <h2 class="font-pixel text-sm mb-4">CHARGEMENT...</h2>
    <div class="w-64 h-4 border-2 border-rambo-gold p-1">
      <div class="h-full bg-rambo-gold animate-pulse" style="width: 60%"></div>
    </div>
    <p class="text-xs mt-4 text-rambo-gold">Récupération des données...</p>
  </div>
</body>
</html>
