<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsenal CV - Delete Confirm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen">
  <!-- Mockup: arsenal-cv - delete-confirm -->
  <div class="fixed inset-0 bg-retro-black bg-opacity-90 flex items-center justify-center p-4">
    <div class="border-4 border-rambo-red bg-retro-cream text-retro-black max-w-md p-6 shadow-[4px_4px_0_0_#0d0d0d] text-center">
      <div class="text-5xl mb-4">⚠️</div>
      <h2 class="font-pixel text-sm mb-4">CONFIRMER SUPPRESSION</h2>
      <p class="text-rambo-gray mb-6"></p>
      <p class="mb-6">Voulez-vous vraiment supprimer <span class="font-bold">"Développeur Full Stack"</span> ?</p>
      
      <div class="flex gap-2">
        <button class="flex-1 bg-rambo-gray text-white py-3 font-pixel text-xs border-2 border-retro-black">ANNULER</button>
        <button class="flex-1 bg-rambo-red text-white py-3 font-pixel text-xs border-2 border-retro-black">SUPPRIMER</button>
      </div>
    </div>
  </div>
</body>
</html>
