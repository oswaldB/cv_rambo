<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tableau de Bord - Nominal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            rambo: {
                                red: "#FF0000",
                                green: "#2E8B57",
                                gray: "#2F4F4F",
                                gold: "#FFD700",
                            },
                            retro: { black: "#0d0d0d", cream: "#f0f0d8" },
                        },
                        fontFamily: { pixel: ['"Press Start 2P"', "cursive"] },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-retro-black text-retro-cream min-h-screen">
        <!-- Mockup: tableau-bord - nominal -->
        <div class="fixed inset-0 p-4">
            <div class="max-w-4xl mx-auto">
                <!-- Header -->
                <header
                    class="border-b-4 border-rambo-red p-4 mb-6 flex items-center justify-between"
                >
                    <h1 class="font-pixel text-rambo-red text-sm">
                        🎯 QG TACTIQUE
                    </h1>
                    <button class="font-pixel text-xs text-rambo-gold">
                        [X]
                    </button>
                </header>

                <!-- Stats Grid -->
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div
                        class="border-4 border-rambo-red bg-retro-cream text-retro-black p-4 text-center shadow-[4px_4px_0_0_#0d0d0d]"
                    >
                        <div class="font-pixel text-xs text-rambo-gray mb-2">
                            🔫 BALLES TIRÉES
                        </div>
                        <div class="font-pixel text-3xl text-rambo-red">42</div>
                    </div>

                    <div
                        class="border-4 border-rambo-gold bg-retro-cream text-retro-black p-4 text-center shadow-[4px_4px_0_0_#0d0d0d]"
                    >
                        <div class="font-pixel text-xs text-rambo-gray mb-2">
                            🎯 TAUX DE TOUCHÉES
                        </div>
                        <div class="font-pixel text-3xl text-rambo-gold">
                            24%
                        </div>
                    </div>

                    <div
                        class="border-4 border-rambo-green bg-retro-cream text-retro-black p-4 text-center shadow-[4px_4px_0_0_#0d0d0d]"
                    >
                        <div class="font-pixel text-xs text-rambo-gray mb-2">
                            📦 MUNITIONS RESTANTES
                        </div>
                        <div class="font-pixel text-3xl text-rambo-green">
                            15
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div
                    class="border-2 border-rambo-gray p-4 bg-rambo-gray bg-opacity-20"
                >
                    <p class="font-pixel text-xs mb-3">⚡ ACTIONS RAPIDES</p>
                    <div class="flex gap-3">
                        <button
                            class="bg-rambo-green text-white px-4 py-2 font-pixel text-xs border-2 border-retro-black"
                        >
                            VOIR LE KANBAN
                        </button>
                        <button
                            class="bg-rambo-blue text-white px-4 py-2 font-pixel text-xs border-2 border-retro-black"
                        >
                            MODE RAFALE
                        </button>
                        <button
                            class="bg-rambo-gold text-retro-black px-4 py-2 font-pixel text-xs border-2 border-retro-black"
                        >
                            EXPORTER CV
                        </button>
                    </div>
                </div>

                <!-- Definitions -->
                <div class="border-2 border-rambo-gray p-4 mt-6 bg-rambo-gray bg-opacity-10">
                    <p class="font-pixel text-xs mb-3 text-rambo-gold">📖 DEFINITIONS</p>
                    <div class="grid grid-cols-3 gap-4 text-xs">
                        <div>
                            <span class="text-rambo-red font-pixel">🔫 BALLES TIRÉES :</span>
                            <span class="text-retro-cream/70"> Total des candidatures envoyées</span>
                        </div>
                        <div>
                            <span class="text-rambo-gold font-pixel">🎯 TAUX DE TOUCHÉES :</span>
                            <span class="text-retro-cream/70"> % de réponses positives/reçues</span>
                        </div>
                        <div>
                            <span class="text-rambo-green font-pixel">📦 MUNITIONS RESTANTES :</span>
                            <span class="text-retro-cream/70"> Candidatures restantes ce mois</span>
                        </div>
                    </div>
                </div>

                <!-- Navigation buttons -->
                <div class="flex flex-wrap gap-3 mt-6 justify-center">
                    <button class="bg-rambo-gray text-retro-cream px-4 py-2 font-pixel text-xs border-2 border-retro-black hover:bg-rambo-gray/80">
                        ⚙️ SETTINGS
                    </button>
                    <button class="bg-rambo-purple text-retro-cream px-4 py-2 font-pixel text-xs border-2 border-retro-black hover:bg-rambo-purple/80">
                        📊 EXPÉRIENCES
                    </button>
                    <button class="bg-rambo-blue text-retro-cream px-4 py-2 font-pixel text-xs border-2 border-retro-black hover:bg-rambo-blue/80">
                        📝 MODIFIER CV
                    </button>
                    <button class="bg-rambo-red text-retro-cream px-4 py-2 font-pixel text-xs border-2 border-retro-black hover:bg-rambo-red/80">
                        🎙️ MODE JOURNALISTE
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
