<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - Skip Disabled</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: onboarding - skip-disabled -->
  
  <div class="fixed inset-0 bg-retro-dark p-4 flex flex-col">
    
    <!-- Progress -->
    <div class="mb-6">
      <div class="flex justify-between mb-2">
        <span class="font-pixel text-xs text-retro-blue">ETAPE 1/3</span>
      </div>
      
      <div class="h-3 bg-retro-black border-2 border-retro-cream/30">
        <div class="h-full bg-retro-blue w-1/3"></div>
      </div>
    </div>
    
    <!-- Content -->
    <div class="flex-1 flex flex-col items-center justify-center">
      <div class="text-6xl mb-4">👤</div>
      
      <h2 class="font-pixel text-lg text-retro-blue mb-2">BIENVENUE!</h2>
      
      <p class="text-xl text-retro-cream/70 mb-6 text-center max-w-md">
        Creez votre profil pour continuer.
      </p>
      
      <!-- Options -->
      <div class="space-y-3 w-full max-w-sm">
        <button class="w-full px-6 py-4 bg-retro-blue text-retro-cream font-pixel text-xs border-4 border-retro-black shadow-[4px_4px_0_0_#0d0d0d] hover:translate-y-0.5 hover:shadow-[2px_2px_0_0_#0d0d0d] transition-all">
          📄 IMPORTER UN CV
        </button>
        
        <button class="w-full px-6 py-4 bg-retro-cream text-retro-black font-pixel text-xs border-4 border-retro-black shadow-[4px_4px_0_0_#0d0d0d] hover:translate-y-0.5 hover:shadow-[2px_2px_0_0_#0d0d0d] transition-all">
          ✏️ CREER MANUELLEMENT
        </button>
      </div>
    </div>
    
    <!-- Disabled skip button -->
    <div class="mt-4 text-center">
      <button disabled class="px-4 py-2 text-retro-cream/30 cursor-not-allowed">
        Passer l'etape →
      </button>
      
      <p class="text-xs text-retro-yellow mt-2">
        ⚠️ Le profil est obligatoire pour utiliser l'app
      </p>
    </div>
  </div>
</body>
</html>
