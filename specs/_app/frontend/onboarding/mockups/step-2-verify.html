<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - Step 2 Verify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: onboarding - step-2-verify -->
  
  <div class="fixed inset-0 bg-retro-dark p-4 flex flex-col">
    
    <!-- Progress -->
    <div class="mb-4">
      <div class="flex justify-between mb-2">
        <span class="font-pixel text-xs text-retro-blue">ETAPE 2/3</span>
      </div>
      
      <div class="h-3 bg-retro-black border-2 border-retro-cream/30">
        <div class="h-full bg-retro-blue w-2/3"></div>
      </div>
    </div>
    
    <!-- Title -->
    <div class="text-center mb-4">
      <h2 class="font-pixel text-xs text-retro-blue mb-1">VERIFICATION</h2>
      
      <p class="text-base text-retro-cream/70">Corrigez si necessaire:</p>
    </div>
    
    <!-- Form -->
    <div class="flex-1 overflow-y-auto">
      <div class="space-y-3">
        <div>
          <label class="block font-pixel text-xs text-retro-cream mb-1">NOM</label>
          <input type="text" value="DUPONT" 
            class="w-full px-3 py-2 bg-retro-cream border-4 border-retro-black text-retro-black text-lg font-pixel-body focus:outline-none focus:border-retro-blue">
        </div>
        
        <div>
          <label class="block font-pixel text-xs text-retro-cream mb-1">PRENOM</label>
          <input type="text" value="Jean" 
            class="w-full px-3 py-2 bg-retro-cream border-4 border-retro-black text-retro-black text-lg font-pixel-body focus:outline-none focus:border-retro-blue">
        </div>
        
        <div>
          <label class="block font-pixel text-xs text-retro-cream mb-1">TITRE</label>
          <input type="text" value="Developpeur Full Stack" 
            class="w-full px-3 py-2 bg-retro-cream border-4 border-retro-black text-retro-black text-lg font-pixel-body focus:outline-none focus:border-retro-blue">
        </div>
        
        <div>
          <label class="block font-pixel text-xs text-retro-cream mb-1">EMAIL</label>
          <input type="email" value="jean.dupont@email.fr" 
            class="w-full px-3 py-2 bg-retro-cream border-4 border-retro-black text-retro-black text-lg font-pixel-body focus:outline-none focus:border-retro-blue">
        </div>
        
        <div>
          <label class="block font-pixel text-xs text-retro-cream mb-1">TELEPHONE</label>
          <input type="tel" value="06 12 34 56 78" 
            class="w-full px-3 py-2 bg-retro-cream border-4 border-retro-black text-retro-black text-lg font-pixel-body focus:outline-none focus:border-retro-blue">
        </div>
        
        <div class="bg-retro-yellow/10 border-2 border-retro-yellow/30 p-3">
          <p class="text-sm text-retro-cream/70">
            <span class="text-retro-yellow">⚠️</span>
            3 experiences detectees - a verifier a l'etape suivante
          </p>
        </div>
      </div>
    </div>
    
    <!-- Actions -->
    <div class="mt-4 flex gap-3">
      <button class="flex-1 px-4 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-4 border-retro-cream/30 hover:border-retro-cream transition-all">
        ← RETOUR
      </button>
      
      <button class="flex-1 px-4 py-3 bg-retro-blue text-retro-cream font-pixel text-xs border-4 border-retro-black shadow-[4px_4px_0_0_#0d0d0d] hover:translate-y-0.5 hover:shadow-[2px_2px_0_0_#0d0d0d] transition-all">
        SUIVANT →
      </button>
    </div>
  </div>
</body>
</html>
