<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - Step 1 Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: onboarding - step-1-upload -->
  
  <div class="fixed inset-0 bg-retro-dark p-4 flex flex-col">
    
    <!-- Progress -->
    <div class="mb-6">
      <div class="flex justify-between mb-2">
        <span class="font-pixel text-xs text-retro-blue">ETAPE 1/3</span>
      </div>
      
      <div class="h-3 bg-retro-black border-2 border-retro-cream/30">
        <div class="h-full bg-retro-blue w-1/3"></div>
      </div>
    </div>
    
    <!-- Upload state -->
    <div class="flex-1 flex flex-col items-center justify-center">
      <div class="text-6xl mb-4">📤</div>
      
      <h2 class="font-pixel text-xs text-retro-blue mb-4">UPLOAD EN COURS</h2>
      
      <div class="bg-retro-cream border-4 border-retro-black p-4 w-full max-w-sm mb-4">
        <div class="flex items-center gap-3">
          <span class="text-3xl">📄</span>
          
          <div class="flex-1">
            <p class="font-pixel text-xs text-retro-black">CV_Dupont.pdf</p>
            <p class="text-sm text-retro-dark/70">245 Ko</p>
          </div>
        </div>
      </div>
      
      <div class="w-64">
        <div class="flex justify-between text-sm text-retro-cream/50 mb-1">
          <span>Upload</span>
          
          <span>78%</span>
        </div>
        
        <div class="h-4 bg-retro-black border-4 border-retro-cream/30 p-0.5">
          <div class="h-full bg-retro-blue w-[78%]"></div>
        </div>
      </div>
      
      <button class="mt-6 px-4 py-2 text-retro-cream/50 hover:text-retro-red transition-colors">
        Annuler
      </button>
    </div>
  </div>
</body>
</html>
