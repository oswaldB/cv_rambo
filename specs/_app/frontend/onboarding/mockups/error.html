<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: onboarding - error -->
  
  <div class="fixed inset-0 bg-retro-dark p-4 flex flex-col">
    
    <!-- Progress -->
    <div class="mb-6">
      <div class="flex justify-between mb-2">
        <span class="font-pixel text-xs text-retro-red">ERREUR</span>
      </div>
    </div>
    
    <!-- Error content -->
    <div class="flex-1 flex flex-col items-center justify-center">
      <div class="text-8xl mb-4">💥</div>
      
      <h2 class="font-pixel text-xs text-retro-red mb-4">ERREUR ONBOARDING</h2>
      
      <div class="bg-retro-black border-4 border-retro-red p-6 max-w-md shadow-[4px_4px_0_0_#e74c3c]">
        <p class="text-xl text-retro-cream mb-4 text-center">
          Impossible de finaliser la configuration.
        </p>
        
        <p class="text-lg text-retro-cream/70">
          Probleme:</p>
        
        <div class="mt-2 p-3 bg-retro-black border-2 border-retro-red/30">
          <code class="text-sm text-retro-red">
            EXTRACTION_FAILED<br>
            Impossible de lire le PDF<br>
            Fichier corrompu ou protege
          </code>
        </div>
      </div>
      
      <div class="mt-8 flex gap-4">
        <button class="px-4 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-4 border-retro-cream/30 hover:border-retro-cream transition-all">
          CREER MANUELLEMENT
        </button>
        
        <button class="px-6 py-3 bg-retro-red text-retro-cream font-pixel text-xs border-4 border-retro-black shadow-[4px_4px_0_0_#0d0d0d] hover:translate-y-0.5 hover:shadow-[2px_2px_0_0_#0d0d0d] transition-all">
          REESSAYER
        </button>
      </div>
    </div>
  </div>
</body>
</html>
