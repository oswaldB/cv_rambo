<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - Step 1 Extracting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: onboarding - step-1-extracting -->
  
  <div class="fixed inset-0 bg-retro-dark p-4 flex flex-col">
    
    <!-- Progress -->
    <div class="mb-6">
      <div class="flex justify-between mb-2">
        <span class="font-pixel text-xs text-retro-blue">ETAPE 1/3</span>
      </div>
      
      <div class="h-3 bg-retro-black border-2 border-retro-cream/30">
        <div class="h-full bg-retro-blue w-1/3"></div>
      </div>
    </div>
    
    <!-- Extracting state -->
    <div class="flex-1 flex flex-col items-center justify-center">
      <div class="relative mb-6">
        <svg class="animate-spin h-16 w-16 text-retro-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        
        <div class="absolute inset-0 flex items-center justify-center">
          <span class="text-2xl">🔍</span>
        </div>
      </div>
      
      <h2 class="font-pixel text-xs text-retro-blue mb-4">EXTRACTION DES DONNEES</h2>
      
      <p class="text-lg text-retro-cream/70 text-center mb-6">
        Analyse du PDF en cours...
      </p>
      
      <!-- Progress -->
      <div class="w-64 space-y-2">
        <div class="flex items-center gap-2 text-retro-green">
          <span>✓</span>
          <span>Lecture PDF</span>
        </div>
        
        <div class="flex items-center gap-2 text-retro-green">
          <span>✓</span>
          <span>Extraction texte</span>
        </div>
        
        <div class="flex items-center gap-2 animate-pulse">
          <span class="text-retro-blue">⏳</span>
          <span>Identification sections...</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
