<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Offre - Nominal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen">
  <!-- Mockup: capture-offre - nominal -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="border-4 border-rambo-gold bg-retro-cream text-retro-black p-6 max-w-lg shadow-[4px_4px_0_0_#0d0d0d]">
      <div class="flex justify-between items-center mb-6 border-b-2 border-rambo-gray pb-2">
        <h2 class="font-pixel text-sm">🎯 OFFRE DÉTECTÉE</h2>
        <button class="text-rambo-red font-pixel">✕</button>
      </div>
      
      <div class="border-2 border-rambo-gray p-4 mb-6 bg-white">
        <h3 class="font-pixel text-xs mb-2">Développeur Full Stack</h3>
        <p class="text-sm text-rambo-gray mb-1">📍 TechCorp</p>
        <p class="text-sm text-rambo-gray mb-2">🔗 linkedin.com/jobs/123</p>
        <p class="text-xs text-rambo-gray line-clamp-3">Nous recherchons un développeur passionné pour rejoindre notre équipe...</p>
      </div>
      
      <div class="flex gap-3">
        <button class="flex-1 bg-rambo-gray text-white py-3 font-pixel text-xs border-2 border-retro-black hover:shadow-[2px_2px_0_0_#0d0d0d]">
          📋 AJOUTER À LA LISTE
        </button>
        <button class="flex-1 bg-rambo-red text-white py-3 font-pixel text-xs border-2 border-retro-black hover:shadow-[2px_2px_0_0_#0d0d0d]">
          🔥 TIRER DIRECT
        </button>
      </div>
    </div>
  </div>
</body>
</html>
