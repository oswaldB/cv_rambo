<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Offre - Edit Confirm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen">
  <!-- Mockup: capture-offre - edit-confirm -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="border-4 border-rambo-blue bg-retro-cream text-retro-black p-6 max-w-lg shadow-[4px_4px_0_0_#0d0d0d]">
      <div class="flex justify-between items-center mb-4 border-b-2 border-rambo-gray pb-2">
        <h2 class="font-pixel text-sm">✏️ VÉRIFIER LES DONNÉES</h2>
        <button class="text-rambo-red font-pixel">✕</button>
      </div>
      
      <form class="space-y-3">
        <div>
          <label class="font-pixel text-xs block mb-1">TITRE</label>
          <input type="text" value="Développeur Full Stack" class="w-full border-2 border-rambo-gray p-2 font-sans">
        </div>
        <div>
          <label class="font-pixel text-xs block mb-1">ENTREPRISE</label>
          <input type="text" value="TechCorp" class="w-full border-2 border-rambo-gray p-2 font-sans">
        </div>
        <div>
          <label class="font-pixel text-xs block mb-1">URL</label>
          <input type="text" value="linkedin.com/jobs/123" class="w-full border-2 border-rambo-gray p-2 font-sans text-sm">
        </div>
        <div>
          <label class="font-pixel text-xs block mb-1">DESCRIPTION</label>
          <textarea class="w-full border-2 border-rambo-gray p-2 font-sans h-20 text-sm">Nous recherchons un développeur passionné...</textarea>
        </div>
        
        <div class="flex gap-3 pt-4">
          <button type="button" class="flex-1 bg-rambo-gray text-white py-3 font-pixel text-xs border-2 border-retro-black">ANNULER</button>
          <button type="submit" class="flex-1 bg-rambo-green text-white py-3 font-pixel text-xs border-2 border-retro-black">CONFIRMER</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
