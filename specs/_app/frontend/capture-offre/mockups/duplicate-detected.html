<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Offre - Duplicate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen">
  <!-- Mockup: capture-offre - duplicate-detected -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="border-4 border-rambo-red bg-retro-cream text-retro-black p-6 max-w-md shadow-[4px_4px_0_0_#0d0d0d]">
      <div class="text-center mb-4">
        <div class="text-4xl">⚠️</div>
      </div>
      
      <h2 class="font-pixel text-sm mb-4 text-center">DOUBLON DÉTECTÉ</h2>
      <p class="text-rambo-gray mb-6 text-sm">Cette offre existe déjà dans votre Kanban.</p>
      
      <div class="space-y-3">
        <button class="w-full bg-rambo-gray text-white py-3 font-pixel text-xs border-2 border-retro-black">
          👁️ VOIR L'EXISTANT
        </button>
        <button class="w-full bg-rambo-red text-white py-3 font-pixel text-xs border-2 border-retro-black">
          📝 CRÉER QUAND MÊME
        </button>
      </div>
    </div>
  </div>
</body>
</html>
