<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Offre - Direct Shot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen flex items-center justify-center">
  <!-- Mockup: capture-offre - direct-shot-fired -->
  <div class="text-center">
    <div class="text-6xl mb-4 animate-pulse">🔥</div>
    <h2 class="font-pixel text-xl mb-4">TIR DIRECT LANCÉ</h2>
    <p class="text-rambo-gold mb-6">Pré-remplissage et soumission automatique en cours...</p>
    <div class="w-64 h-4 border-2 border-rambo-red p-1 mx-auto">
      <div class="h-full bg-rambo-red animate-pulse" style="width: 30%"></div>
    </div>
  </div>
</body>
</html>
