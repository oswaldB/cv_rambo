<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Offre - Added Success</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{rambo:{red:'#FF0000',green:'#2E8B57',gray:'#2F4F4F',gold:'#FFD700'},retro:{black:'#0d0d0d',cream:'#f0f0d8'}},fontFamily:{pixel:['"Press Start 2P"','cursive']}}}}</script>
</head>
<body class="bg-retro-black text-retro-cream min-h-screen flex items-center justify-center">
  <!-- Mockup: capture-offre - added-success -->
  <div class="border-4 border-rambo-green bg-retro-cream text-retro-black p-8 max-w-md text-center shadow-[4px_4px_0_0_#0d0d0d]">
    <div class="text-6xl mb-4">✅</div>
    <h2 class="font-pixel text-lg mb-4">AJOUTÉ À LA LISTE</h2>
    <p class="text-rambo-gray mb-6">L'offre a été capturée et ajoutée à votre Kanban.</p>
    <div class="space-y-3">
      <button class="w-full bg-rambo-green text-white py-3 font-pixel text-xs border-2 border-retro-black">VOIR LE KANBAN</button>
      <button class="w-full bg-rambo-gray text-white py-3 font-pixel text-xs border-2 border-retro-black">FERMER</button>
    </div>
  </div>
</body>
</html>
