<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban - Dragging</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: kanban - dragging -->
  
  <div class="fixed inset-0 bg-retro-dark flex flex-col">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b-4 border-retro-cream/20">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🎯</span>
        <h1 class="font-pixel text-sm text-retro-blue">QG DES CIBLES</h1>
      </div>
      <button class="text-retro-red font-pixel text-xs">[X]</button>
    </div>
    
    <!-- Kanban with drag state -->
    <div class="flex-1 overflow-x-auto p-4">
      <div class="flex gap-4 h-full min-w-max">
        
        <!-- Column 1: A postuler -->
        <div class="w-72 flex flex-col">
          <div class="bg-retro-cream/10 border-4 border-retro-cream/30 p-3 mb-3">
            <div class="flex items-center justify-between">
              <h2 class="font-pixel text-xs text-retro-cream">A POSTULER</h2>
              <span class="bg-retro-blue text-retro-cream px-2 py-0.5 text-sm border-2 border-retro-black">3</span>
            </div>
          </div>
          
          <div class="flex-1 space-y-3 overflow-y-auto">
            <!-- Card being dragged - ghost in original position -->
            <div class="h-28 bg-retro-cream/20 border-4 border-dashed border-retro-cream/30"></div>
            
            <!-- Other cards -->
            <div class="bg-retro-cream border-4 border-retro-black p-3 shadow-[2px_2px_0_0_#0d0d0d]">
              <h3 class="font-pixel text-xs text-retro-black mb-1">Frontend React</h3>
              <p class="text-sm text-retro-dark/70">StartupXYZ</p>
            </div>
          </div>
        </div>
        
        <!-- Column 2: Candidature envoyee (drop target) -->
        <div class="w-72 flex flex-col">
          <div class="bg-retro-cream/10 border-4 border-retro-green p-3 mb-3 bg-retro-green/10">
            <div class="flex items-center justify-between">
              <h2 class="font-pixel text-xs text-retro-green">ENVOYE</h2>
              <span class="bg-retro-green text-retro-black px-2 py-0.5 text-sm border-2 border-retro-black">2→3</span>
            </div>
          </div>
          
          <div class="flex-1 space-y-3 overflow-y-auto border-4 border-dashed border-retro-green p-2 bg-retro-green/5">
            <!-- Drop zone indicator -->
            <div class="h-28 border-4 border-dashed border-retro-green bg-retro-green/10 flex items-center justify-center">
              <span class="text-retro-green text-lg">DEPOSEZ ICI</span>
            </div>
            
            <!-- Existing cards -->
            <div class="bg-retro-cream border-4 border-retro-black p-3 opacity-50">
              <h3 class="font-pixel text-xs text-retro-black mb-1">Dev Node.js</h3>
              <p class="text-sm text-retro-dark/70">AgenceWeb</p>
            </div>
          </div>
        </div>
        
        <!-- Drag preview (floating) -->
        <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-retro-cream border-4 border-retro-black p-3 shadow-[4px_4px_0_0_#0d0d0d] w-64 z-50 rotate-3">
          <h3 class="font-pixel text-xs text-retro-black mb-1">Dev Full Stack H/F</h3>
          <p class="text-sm text-retro-dark/70 mb-2">TechCorp - Paris</p>
          <div class="flex flex-wrap gap-1">
            <span class="px-1.5 py-0.5 bg-retro-blue text-retro-cream text-xs border border-retro-black">45-55K</span>
          </div>
        </div>
        
        <!-- Columns 3 & 4 -->
        <div class="w-72 flex flex-col">
          <div class="bg-retro-cream/10 border-4 border-retro-cream/30 p-3 mb-3">
            <h2 class="font-pixel text-xs text-retro-cream">ENTRETIEN</h2>
          </div>
          
          <div class="flex-1"></div>
        </div>
        
        <div class="w-72 flex flex-col">
          <div class="bg-retro-cream/10 border-4 border-retro-cream/30 p-3 mb-3">
            <h2 class="font-pixel text-xs text-retro-cream">ARCHIVE</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
