<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban - Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: kanban - error -->
  
  <div class="fixed inset-0 bg-retro-dark flex flex-col">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b-4 border-retro-cream/20">
      <h1 class="font-pixel text-sm text-retro-blue">QG DES CIBLES</h1>
      <button class="text-retro-red font-pixel text-xs">[X]</button>
    </div>
    
    <!-- Error state -->
    <div class="flex-1 flex flex-col items-center justify-center">
      <div class="text-8xl mb-4">💥</div>
      
      <h2 class="font-pixel text-xs text-retro-red mb-4">ERREUR CHARGEMENT</h2>
      
      <div class="bg-retro-black border-4 border-retro-red p-6 max-w-md shadow-[4px_4px_0_0_#e74c3c]">
        <p class="text-xl text-retro-cream mb-4 text-center">
          Impossible de charger les cibles depuis PouchDB.
        </p>
        
        <p class="text-lg text-retro-cream/70">
          Erreur:</p>
        
        <div class="mt-2 p-3 bg-retro-black border-2 border-retro-red/30">
          <code class="text-sm text-retro-red">
            Database corruption detected<br>
            Error: POUCHDB_READ_ERROR
          </code>
        </div>
      </div>
      
      <div class="mt-8 flex gap-4">
        <button class="px-4 py-3 bg-retro-dark text-retro-cream font-pixel text-xs border-4 border-retro-cream/30">
          VOIR LOGS
        </button>
        
        <button class="px-6 py-3 bg-retro-red text-retro-cream font-pixel text-xs border-4 border-retro-black shadow-[4px_4px_0_0_#0d0d0d] hover:translate-y-0.5 hover:shadow-[2px_2px_0_0_#0d0d0d] transition-all">
          REESSAYER
        </button>
      </div>
    </div>
  </div>
</body>
</html>
