<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban - Drop Rejected</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: kanban - drop-rejected -->
  
  <div class="fixed inset-0 bg-retro-dark flex flex-col">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b-4 border-retro-cream/20">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🎯</span>
        <h1 class="font-pixel text-sm text-retro-blue">QG DES CIBLES</h1>
      </div>
      <button class="text-retro-red font-pixel text-xs">[X]</button>
    </div>
    
    <!-- Kanban board -->
    <div class="flex-1 overflow-x-auto p-4">
      <div class="flex gap-4 h-full min-w-max">
        
        <!-- Columns -->
        <div class="w-72 flex flex-col">
          <div class="bg-retro-cream/10 border-4 border-retro-cream/30 p-3 mb-3">
            <h2 class="font-pixel text-xs text-retro-cream">A POSTULER</h2>
          </div>
          
          <div class="flex-1 space-y-3">
            <div class="bg-retro-cream border-4 border-retro-black p-3 shadow-[2px_2px_0_0_#0d0d0d]">
              <h3 class="font-pixel text-xs text-retro-black">Dev Full Stack</h3>
            </div>
          </div>
        </div>
        
        <!-- Rejected drop column (Archive) -->
        <div class="w-72 flex flex-col">
          <div class="bg-retro-red/20 border-4 border-retro-red p-3 mb-3">
            <div class="flex items-center justify-between">
              <h2 class="font-pixel text-xs text-retro-red">ARCHIVE</h2>
              <span class="text-retro-red">🚫</span>
            </div>
          </div>
          
          <div class="flex-1 border-4 border-dashed border-retro-red bg-retro-red/5 p-2 flex items-center justify-center">
            <div class="text-center">
              <span class="text-4xl">🚫</span>
              
              <p class="text-retro-red font-pixel text-xs mt-2">ACTION INTERDITE</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Error toast -->
    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-retro-red border-4 border-retro-black px-6 py-3 shadow-[4px_4px_0_0_#0d0d0d]">
      <div class="flex items-center gap-3">
        <span class="text-xl">🚫</span>
        <div>
          <p class="font-pixel text-xs text-retro-cream">DEPLACEMENT REFUSE</p>
          <p class="text-sm text-retro-cream/70">Impossible de deplacer directement vers Archive</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
