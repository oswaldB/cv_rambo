<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban - Empty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              black: '#0d0d0d',
              cream: '#f0f0d8',
              red: '#e74c3c',
              blue: '#3498db',
              green: '#2ecc71',
              yellow: '#f1c40f',
              dark: '#2c3e50'
            }
          },
          fontFamily: {
            pixel: ['"Press Start 2P"', 'cursive'],
            'pixel-body': ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-retro-dark text-retro-cream font-pixel-body min-h-screen">
  <!-- Mockup: kanban - empty -->
  
  <div class="fixed inset-0 bg-retro-dark flex flex-col">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b-4 border-retro-cream/20">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🎯</span>
        <h1 class="font-pixel text-sm text-retro-blue">QG DES CIBLES</h1>
      </div>
      <button class="text-retro-red font-pixel text-xs">[X]</button>
    </div>
    
    <!-- Empty state -->
    <div class="flex-1 flex items-center justify-center">
      <div class="text-center">
        <div class="text-8xl mb-6">🎯</div>
        
        <h2 class="font-pixel text-xs text-retro-yellow mb-4">AUCUNE CIBLE</h2>
        
        <p class="text-xl text-retro-cream/70 mb-8 max-w-md">
          Votre kanban est vide. Capturez des offres<br>
          depuis LinkedIn ou WTTJ pour commencer.
        </p>
        
        <div class="bg-retro-black border-4 border-retro-yellow p-4 max-w-sm mx-auto mb-6">
          <p class="text-base text-retro-cream/70 mb-3">Comment capturer:</p>
          
          <ol class="text-sm text-retro-cream/50 text-left space-y-2">
            
            <li>1. Allez sur une page d'offre</li>
            
            <li>2. Le CV Rambo detecte automatiquement</li>
            
            <li>3. Cliquez sur "Ajouter au Kanban"</li>
          </ol>
        </div>
        
        <button class="px-6 py-3 bg-retro-yellow text-retro-black font-pixel text-xs border-4 border-retro-black shadow-[4px_4px_0_0_#0d0d0d] hover:translate-y-0.5 hover:shadow-[2px_2px_0_0_#0d0d0d] transition-all">
          TROUVER DES OFFRES →
        </button>
      </div>
    </div>
  </div>
</body>
</html>
