version: '3.8'

services:
  # CouchDB - Base de données centrale
  couchdb:
    image: couchdb:3.2
    container_name: cv-rambo-couchdb
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=admin_password
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.ini
    networks:
      - cv-rambo

  # Workflow - Génération de scripts
  workflow:
    build: ./workflow
    container_name: cv-rambo-workflow
    environment:
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_DB=cv-rambo
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=admin_password
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL=minimax
    depends_on:
      - couchdb
    networks:
      - cv-rambo
    restart: unless-stopped

volumes:
  couchdb_data:

networks:
  cv-rambo:
    driver: bridge
