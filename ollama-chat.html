<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat - Minimax M3</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message-bubble { word-break: break-word; }
        .typing-dot {
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden">
    <div x-data="ollamaChat()" x-init="init()" class="flex flex-col h-full max-w-4xl mx-auto">
        
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 bg-gray-800 border-b border-gray-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="font-semibold text-lg">Ollama Chat</h1>
                    <p class="text-xs text-gray-400" x-text="model"></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button @click="showSettings = !showSettings" class="p-2 hover:bg-gray-700 rounded-lg transition" :class="showSettings ? 'bg-gray-700' : ''" title="Paramètres">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </button>
                <button @click="clearChat()" class="p-2 hover:bg-gray-700 rounded-lg transition" title="Effacer la conversation">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Settings Panel -->
        <div x-show="showSettings" x-transition class="bg-gray-800 border-b border-gray-700 px-6 py-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Provider API</label>
                    <select x-model="apiProvider" @change="updateProvider()" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                        <template x-for="p in providers" :key="p.id">
                            <option :value="p.id" x-text="p.name"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">API Key</label>
                    <input x-model="apiKey" type="password" placeholder="sk-..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">API Endpoint</label>
                    <input x-model="apiEndpoint" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Modèle</label>
                    <input x-model="model" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                </div>
            </div>
            <p class="text-xs text-yellow-500 mt-2">⚠️ Ollama Cloud a des restrictions CORS. Si vous voyez une erreur CORS, utilisez une extension navigateur comme "CORS Unblock" ou servez le fichier via un serveur local.</p>
        </div>

        <!-- Messages -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto scrollbar-hide px-6 py-4 space-y-4">
            <!-- Welcome message -->
            <div x-show="messages.length === 0" class="text-center py-12">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-semibold mb-2">Bienvenue sur Ollama Chat</h2>
                <p class="text-gray-400">Posez vos questions au modèle Minimax M3</p>
            </div>

            <template x-for="(msg, index) in messages" :key="index">
                <div class="flex gap-3" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                    <!-- AI Avatar -->
                    <div x-show="msg.role === 'assistant'" class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg flex items-center justify-center flex-shrink-0 mt-1">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                    </div>

                    <!-- Message -->
                    <div class="max-w-[80%] message-bubble px-4 py-2.5 rounded-2xl text-sm leading-relaxed"
                         :class="msg.role === 'user' ? 'bg-purple-600 text-white rounded-br-md' : 'bg-gray-800 text-gray-100 rounded-bl-md'"
                         x-html="formatMessage(msg.content)"></div>

                    <!-- User Avatar -->
                    <div x-show="msg.role === 'user'" class="w-8 h-8 bg-gray-700 rounded-lg flex items-center justify-center flex-shrink-0 mt-1">
                        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                </div>
            </template>

            <!-- Typing indicator -->
            <div x-show="loading" class="flex gap-3 justify-start">
                <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </div>
                <div class="bg-gray-800 rounded-2xl rounded-bl-md px-4 py-3 flex items-center gap-1">
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                </div>
            </div>
        </div>

        <!-- Error message -->
        <div x-show="error" x-transition class="mx-6 mb-2 px-4 py-2 bg-red-900/50 border border-red-500/50 rounded-lg text-sm text-red-300 whitespace-pre-wrap">
            <span x-text="error"></span>
        </div>

        <!-- Input -->
        <div class="p-4 bg-gray-800 border-t border-gray-700">
            <form @submit.prevent="sendMessage()" class="flex gap-3">
                <input 
                    x-model="inputMessage"
                    type="text" 
                    placeholder="Écrivez votre message..."
                    class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition"
                    :disabled="loading"
                >
                <button 
                    type="submit" 
                    :disabled="!inputMessage.trim() || loading"
                    class="bg-purple-600 hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl px-4 py-3 transition flex items-center justify-center"
                >
                    <svg x-show="!loading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    <svg x-show="loading" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
            <p class="text-xs text-gray-500 mt-2 text-center cursor-pointer hover:text-gray-400" @click="showSettings = true">
                <span x-text="providers.find(p => p.id === apiProvider)?.name || apiProvider"></span> • <span x-text="model"></span> • Cliquez pour configurer
            </p>
        </div>
    </div>

    <script>
        function ollamaChat() {
            return {
                apiKey: '0011dea90cd149cc91c8e7828e35d187.lwnvxLJf3lt4Cv6n_y5teZ_C',
                apiEndpoint: 'https://ollama.com/api',
                model: 'minimax-m3:cloud',
                apiProvider: 'ollama',
                providers: [
                    { id: 'ollama', name: 'Ollama Cloud', endpoint: 'https://ollama.com/api', model: 'minimax-m3:cloud' },
                    { id: 'ollama-local', name: 'Ollama Local', endpoint: 'http://localhost:11434/v1', model: 'llama3' },
                    { id: 'openrouter', name: 'OpenRouter', endpoint: 'https://openrouter.ai/api/v1', model: 'minimax/minimax-m3' },
                    { id: 'openai', name: 'OpenAI', endpoint: 'https://api.openai.com/v1', model: 'gpt-3.5-turbo' },
                    { id: 'custom', name: 'Custom', endpoint: '', model: '' }
                ],
                messages: [],
                inputMessage: '',
                loading: false,
                error: null,
                showSettings: false,

                init() {
                    // Focus sur l'input au chargement
                    this.$nextTick(() => {
                        this.$refs.input?.focus();
                    });
                },

                updateProvider() {
                    const provider = this.providers.find(p => p.id === this.apiProvider);
                    if (provider && provider.id !== 'custom') {
                        this.apiEndpoint = provider.endpoint;
                        this.model = provider.model;
                    }
                },

                async sendMessage() {
                    const message = this.inputMessage.trim();
                    if (!message || this.loading) return;

                    // Ajouter le message utilisateur
                    this.messages.push({
                        role: 'user',
                        content: message
                    });

                    this.inputMessage = '';
                    this.loading = true;
                    this.error = null;

                    // Scroll vers le bas
                    this.scrollToBottom();

                    try {
                        // Détecter si c'est un endpoint Ollama natif ou OpenAI-compatible
                        const isOllamaNative = this.apiEndpoint.includes('ollama.com') && !this.apiEndpoint.includes('/v1');
                        const endpoint = isOllamaNative ? `${this.apiEndpoint}/chat` : `${this.apiEndpoint}/chat/completions`;
                        
                        // Construire les headers selon le provider
                        const headers = {
                            'Authorization': `Bearer ${this.apiKey}`,
                            'Content-Type': 'application/json'
                        };
                        
                        // Headers spécifiques pour OpenRouter
                        if (this.apiEndpoint.includes('openrouter')) {
                            headers['HTTP-Referer'] = window.location.href;
                            headers['X-Title'] = 'Ollama Chat';
                        }
                        
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: headers,
                            body: JSON.stringify({
                                model: this.model,
                                messages: this.messages,
                                stream: false
                            })
                        });

                        if (!response.ok) {
                            const errorData = await response.json().catch(() => ({}));
                            const statusError = errorData.error?.message || `Erreur HTTP ${response.status}`;
                            throw new Error(`${statusError} (${response.status})`);
                        }

                        const data = await response.json();
                        
                        // Format de réponse Ollama natif vs OpenAI
                        let assistantMessage;
                        if (isOllamaNative) {
                            assistantMessage = data.message?.content;
                        } else {
                            assistantMessage = data.choices?.[0]?.message?.content;
                        }
                        
                        if (assistantMessage) {
                            this.messages.push({
                                role: 'assistant',
                                content: assistantMessage
                            });
                        } else {
                            console.log('Response structure:', data);
                            throw new Error('Format de réponse inconnu. Vérifiez la console.');
                        }

                    } catch (err) {
                        console.error('API Error:', err);
                        let errorMsg = err.message;
                        
                        if (err.name === 'TypeError' && err.message === 'Failed to fetch') {
                            if (this.apiEndpoint.includes('ollama.com')) {
                                errorMsg = `Erreur CORS avec Ollama Cloud. Solutions:\n1. Installez une extension "CORS Unblock" dans votre navigateur\n2. Utilisez Ollama en local (http://localhost:11434)\n3. Déployez ce fichier sur un serveur web`;
                            } else {
                                errorMsg = `Impossible de se connecter à ${this.apiEndpoint}. Vérifiez:\n1. Que l'URL est correcte\n2. Que vous avez une connexion internet\n3. Pas de bloqueur CORS`;
                            }
                        } else if (errorMsg.includes('CORS')) {
                            errorMsg = `Erreur CORS : Ollama Cloud bloque les requêtes depuis un fichier local.\n\nSolutions:\n1. Installez une extension "CORS Unblock" dans Chrome/Firefox\n2. Utilisez Ollama Local (changez le provider)\n3. Déployez sur un serveur web (Vercel, Netlify, etc.)`;
                        } else if (errorMsg.includes('401') || errorMsg.includes('Unauthorized')) {
                            errorMsg = `Clé API invalide ou expirée pour ${this.apiProvider}. Vérifiez votre clé dans les paramètres.`;
                        } else if (errorMsg.includes('404')) {
                            errorMsg = `Modèle "${this.model}" non trouvé. Vérifiez le nom du modèle.`;
                        } else if (errorMsg.includes('429')) {
                            errorMsg = 'Trop de requêtes. Veuillez patienter avant de réessayer.';
                        }
                        
                        this.error = errorMsg;
                    } finally {
                        this.loading = false;
                        this.scrollToBottom();
                    }
                },

                clearChat() {
                    this.messages = [];
                    this.error = null;
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = document.getElementById('messagesContainer');
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                },

                formatMessage(content) {
                    // Échapper le HTML
                    let text = content
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    
                    // Formater le code markdown
                    text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre class="bg-gray-900 p-3 rounded-lg overflow-x-auto text-xs my-2"><code>$2</code></pre>');
                    text = text.replace(/`([^`]+)`/g, '<code class="bg-gray-700 px-1 py-0.5 rounded text-xs">$1</code>');
                    
                    // Sauts de ligne
                    text = text.replace(/\n/g, '<br>');
                    
                    return text;
                }
            }
        }
    </script>
</body>
</html>
